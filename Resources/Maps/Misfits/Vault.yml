    - type: Paper
      content: >-
        The pathfinder's rendezvous occurs during "The Age of Lost Prophecies", a dangerous fantastic world full of ancient empires; long cities by states; and countless tombs, undergrounds and monster lairs full of prey. The hero's adventures in the Pathfinder can lead him to abandoned underwater ruins, ghost-to-goth crypts or magical universities in cities in the jungle. You will have a world of endless adventure!


        What's a role-playing game?

        The role game is an interactive story in which one player, the Master (GM), describes the scene and presents the challenges, while other players take on the role of game characters (PC) and try to overcome these challenges. The danger can be in the form of monsters, tricky traps and machinations by hostile agents, but Pathfinder also provides political schemes, puzzles, interpersonal dramas, and much more.


        This game is usually played in a group of four to seven players, one of whom becomes the gamemaster of the band. The master prepares the game world, describes it and manages it and history, setting the tasks and playing for the opponents, allies and random passers-by. Since each scene leads to the next, each player contributes to history by responding to situations according to the personality and capabilities of his character. Bone splashes, combined with pre-set indicators, add an element of randomity and determine whether characters succeed in their actions or not.


        The Flow of the Game

        Pathfinder The game is played in sessions where players meet for several hours, either individually or online, to play the game. The final story in Pathfinder can be short, like a session commonly called "one-shot", or it can stretch to several sessions, forming a campaign that can last months or even years. If the Master likes to tell the story and the players are entertaining, the game can last as long as you want.


        The session can be mostly filled with action, with battles with filthy creatures, runaways from diabolical traps and heroic tasks, but instead it can be negotiated with the Baron about the rights to fort, the penetration of clumsy ice giants into the army, or a trade with an angel for a piece of hair necessary to revive a murdered friend, which ultimately depends on you and your group to decide which game you're playing, from underground research to political drama or something medium.


        The Players

        Everyone in the game of Pathfinder is a player, including the Masters of the Games, but for simplicity, "player" is usually referred to as players who are not the Master. Before the game starts, players come up with the story and identity of their characters, using rules to measure their characters, characteristics, strengths and weaknesses. The Master can limit the options available to create the character, but restrictions are discussed in advance so that everyone can create interesting characters. In general, the only limitation on the character concept is the imagination of the players and the Master's recommendations.


        During the game, players describe the actions of their characters and throw their bones using the power of characters. The Master decides the outcome of these actions. Some players like to play the characters by describing what they would do if they were their characters, while others describe the actions of their characters by telling the story. Do what you like best!


        If this is your first experience in role-playing, it is recommended that you take on the role of player to learn about rules and the world.


        The Game Master

        While players create and manage their characters, the Master is responsible for history and the world, and the Master describes all the situations that players face in adventures, considers how the characters' actions affect history, and interprets the rules as the game moves.


        The Master can create a new adventure by creating a narrative, choosing monsters and assigning treasure himself, or instead he can rely on published adventure, using it as the basis for the session and changing it as necessary to adapt individual players and the style of the band. Some even play games that combine original and published content mixed together to form a new narrative.


        Being a Master is a challenge that requires you to make decisions on rules, tell stories and juggle on other responsibilities, but it can also be very worthwhile and worth all the work done to make a good game. If you play the game for the first time, remember that the only thing that matters is that everyone is having a good time, and you are also doing it. Everything else will come naturally with patience and practice.


        All play (Gaming Is for All)

        Whether you are a Master or a player, participation in the role-playing table game includes a social contract: all of them come together to have fun with history. For many, role-playing is a way to escape the problems of everyday life. Pay attention to everyone at the table and to what they want to do so that everyone can enjoy it. When the group meets for the first time, they must discuss what experience they hope to get at the table and any topics they want to avoid. Everyone must realize that there are elements that can make some players feel uncomfortable or even reluctant, and everyone must accept and respect these boundaries during the game. So everyone can enjoy the game together.


        Pathfinder - It is the responsibility of all players, not just the Master, to make sure that everyone at the table is welcome and amused.


        Tools for Play

        In addition to the rules book, you'll need a few more things to play at Pathfinder. You can find them at a local store or online at paizo.com.


        The character list: Each player will need a character list to create a hero and to record what happens to the character during the game. You can find a character list at the end of the book and online in the form of free PDF files.


        Bones: Players and Masters will need at least one set of multi-dimensional bones, although most participants bring their own. Six-sided bones are fairly common, but the whole set of bones can be found in a local store or online.


        Adventure: Every table needs an adventure to play, whether it's created by the Master or found from the published. You can find many exciting adventures and even whole Adventure Path campaigns on paizo.com.


        Bestyarium: From terrible dragons to harmful gremlins, monsters are a common threat that players can face, and each species has its own characteristics and abilities. They can be found in the Pathfinder Bestia, which is an indispensable book for Masters.


        Maps and figures: It's hard to imagine the chaos of battles, so many groups use maps to visualize the battlefield. These maps are marked with a 1-inch grid and each square represents 5 feet in the game world. The figures and illustrated currents called "paws" are used to represent the characters and enemies they face.


        Additional accessories: There are a lot of additional tools you can add to the game to improve game experience, including the means to track battle moves, a deck of cad describing common spells, digital tools to create characters, and even background music and sound effects sets.
