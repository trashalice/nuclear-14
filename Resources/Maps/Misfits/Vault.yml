                        ♛  [head=2][color=#30a33f]Emerald City./color][/head] ♛

        [italic]Traveler, tired of empty and marauders, soul thirsts for a beautiful one?


        There's been some rumors. “Emerald City”? Trust me, it's not just rumors. – Reality!/bold]


        [color=#247aad][bold]Emerald City./bold][/color] - [italic]The last pillar of civilization in this crazy world, built by the genius, the Magna./italic][bold] Juliana Mercen./bold][italic], It shines like a beacon of hope among radioactive ruins./italic]


        [bold]What's waiting for you outside his walls?/bold]


        [bullet][color=#c88720][bold]The architecture that survived the war:/bold][/color] [italic]The unique structures, carefully preserved and supplemented, will surprise even the most sophisticated traveler./italic]


        [bullet][color=#26b496][bold]An art born in a wasteland:/bold][/color] [italic]Galleries full of rare pieces of pre-war life and works of modern craftsmanship./italic]


        [bullet][bold][color=#5441be]Intellectual elite:[/color][bold] [italic]Meet with scientists, philosophers, and engineers who seek to revive knowledge of the past and create a future./italic] 


        [bullet][color=#a7243d][bold]Safety and order:[/bold][/color] [italic] Our security guards keep an eye on the safety of every resident and guest./italic] 


        [bold]And most importantly, what you won't find anywhere else:/bold] [/bold][color=#4f7fbc]The great theater!/color][bold]

        [italic]The most exciting performances, talented actors, and sets that will strike your imagination, from the tragedies of the pre-war era to modern plays that reflect the harsh reality of the Void. – Everyone here will find a show to their liking./italic]


        [bold][color=#4f7fbc]Splendid restaurant. “Julian's.”![/color][/bold]

        [italic] Our cooks do wonders from the scarce resources of the Void. – Even the simplest tramp here will feel like an aristocrat./italic]


        [bold]But remember:/bold][italic]In Emerald City, not only do you appreciate money, but also the intelligence, culture and contribution to society./italic]


        [bold]Julian Mercen./bold][italic] Don't disappoint him.


        Good luck finding it, or wait for the tickets to be sold for the performances./italic]


        [color=#22b14c]██████████████████████████████████████████[/color]
