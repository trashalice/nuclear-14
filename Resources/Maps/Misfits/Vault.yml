      content: >-
        Cost estimates for pumping stations.


        To whom: Chief Warrant Officer, fifth grade, Joseph Antiran, and Commander (at the time of receipt of the letter) of the 55th Border Platoon.


        From whom: Mouse-2 repair team under the command of Warrant Officer Quanta Quintillia Second Class.


        Damage assessment: Damages are extremely high. Many water channels are destroyed, the pipes rot, 95% Pumps are currently not operational, many underground structures are dilapidated and require urgent repair, and the equipment is severely damaged.


        Recovery options:

        1.Entry into service is a permanent job or an opportunity to work continuously and continuously.


        2.The fix for minimum functionality and emergency activations is the insertion at times of the PS, such as the discharge of the river from the river. If this option is chosen, we cannot guarantee 100%-(The plan has been implemented)


        Estimates for full restoration :

        - Twenty cases of bricks (120 kilogums each)

        - Two working battery boxes and underground lamp boxes (10 batteries)/Every box )

        - Eight pairs of workers, rubber boots.

        - Twenty tray stacks

        - 1.5 tons of logs

        - Seven fuel generators or five micro-reacter batteries to launch the entire underground complex.

        - Three desktops and two wall terminals.

        - One hundred moths of 50 meters each of the low-voltage wires to re-establish the electronics.

        - Four or five boxes of board and remodeling and repair schemes.

        - Three grand of engineer to rebuild.

        - Ten workers for less specialized jobs

        - Five armed guards to shoot down fauna and violators

        - Two portable pumps for initial start-up and cleaning of pump basins

        - Weapons for the self-defence of engineers


        The amount of at least 1,000 lids is also required for additional costs.

        It would be desirable to agree with the local Bazar homelessman to restore their pumping substation and to make the repairs unhindered.


        P.s. We've made progress, sir, engineer McClinn has managed to repair the pump with me, but it's not enough to carry out your plan, and we've also set up a field repair facility in the main control room and store supplies.
