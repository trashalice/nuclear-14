    - type: Paper
      content: >2-

        [head=1]What is it?/head]

        [head=1]Dungeons and Dragons?[/head]


        Dungeons and Dragons (D. Submerge and dragons, D&D, DND) — The beauty of the game is that the final outcome of this story is not determined in advance, and most of the events will be determined according to the actions of the heroes.


        The game has a host. — Master dungeon (a.k.a. dungeon master, DM) who will make sure the plot doesn't slow down, the Master is responsible for all non-game characters. — And friends and enemies, — What does the necromancer plan to do in his tower? How hard does a trembling suck up, where a warrior has been recklessly taking part? The answers to some questions will be ready in advance, and the others will have to be answered by improvising on the fly: because of the great freedom of action, you can't predict what's going to happen to a player. — in D&D Maybe everything.


        What does it look like?

        There's no single right way to play D.&D, It depends on the preferences and capabilities of a group.


        Some people like to build a table of huge, complicated underground mazes, use detailed painted miniatures for heroes and monsters, and measure the range and radius of spells with special lines, while others think there are no better adventures than those that can be built in their imagination: «Why limit yourself to a purchased set of plastic walls when you can rely on the master's descriptions and feel the thick atmosphere of another dungeon?».


        Which one is better? Like any cholivarous question, you can't answer it clearly. It's not necessary, however, because understanding comes after a few games played, and neither one of them is prohibited.
