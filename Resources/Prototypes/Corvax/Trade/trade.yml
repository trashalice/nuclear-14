- type: entity
  id: Trademachine
  abstract: true
  name: City Trading Terminal
  description: Quick supply - it's right nearby. Choose, pay, take.
  suffix: vendor, normal
  components:
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: NcStoreStructuredBoundUi
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: Clickable
  - type: InteractionOutline
  - type: Transform
    anchored: true
    noRot: true
  - type: Physics
    bodyType: Static
  - type: Fixtures
    fixtures:
      fix1:
        density: 300
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5"
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    sprite: Structures/Machines/VendingMachines/ammo.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
  - type: PointLight
    radius: 2.5
    energy: 1
    color: "#b34747"
    mask: /Textures/Effects/LightMasks/cone.png
    autoRot: true

- type: entity
  id: TrademachineCity
  parent: Trademachine
  name: City Trading Terminal
  description: Quick supply - it's right nearby. Choose, pay, take.
  suffix: vendor, normal
  components:
  - type: NcStore
    buyPresets:
    - caravan_buy2
    sellPresets:
    - caravan_sell2
    contractPresets:
    - PresetBazar
  # #Misfits Change — restored TownieShopkeeper access restriction (players must be shopkeeper to use terminal)
  # #Misfits Add — track Hall of Fame roster for the tier contract system
  - type: AccessReader
    access:
    - [ "TownieShopkeeper" ]
  - type: NcContractRoster

- type: entity
  id: TrademachineTickets
  parent: Trademachine
  name: Caravan Trading Terminal
  description: A specialized trading terminal that accepts caravan vouchers in exchange for quality equipment.
  suffix: vendor, Tickets
  components:
  - type: NcStore
    buyPresets:
    - caravan_storetickets
    sellPresets:
    - caravan_storetickets_sell
  - type: AccessReader
    access:
    - [ "TownieShopkeeper" ]
  - type: Sprite
    sprite: _NF/Structures/Machines/VendingMachines/yarrrdrobe.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "normal-unshaded"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded

