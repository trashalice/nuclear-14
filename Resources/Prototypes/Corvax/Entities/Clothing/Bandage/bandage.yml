- type: entity
  parent: Clothing
  id: NCClothingCollarBoSBase
  abstract: true
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Bandage/bandageSerfMBOS.rsi
    state: icon
  - type: Clothing
    sprite: Corvax/Clothing/Bandage/bandageSerfMBOS.rsi
    slots: [ bandage ]
  - type: Unremoveable

- type: entity
  parent: NCClothingCollarBoSBase
  id: NCClothingCollarBoSSerf
  name: BoS Serf Collar
  description: A collar used by the Brotherhood of Steel serfs.
