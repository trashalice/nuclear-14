#MARK: Legion
- type: entity
  parent: Clothing
  id: NCClothingBandageLegionBase
  abstract: true
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Bandage/bandageLegion.rsi
    state: icon
  - type: Clothing
    sprite: Corvax/Clothing/Bandage/bandageLegion.rsi
    slots: [ bandage ]

- type: entity
  parent: NCClothingBandageLegionBase
  id: NCClothingBandageLegionRecruit
  name: recruit bandage Legion
  description: A bandage used by the Legion recruits.
  components:
  - type: ClothingFactionAndRoleAdd
    faction: CaesarLegion
    role: CaesarLegionLegionnaireRecruit # #Misfits Change: Redirected from defunct CaesarLegionRecruit

- type: entity
  parent: Clothing
  id: NCClothingCollarLegionBase
  abstract: true
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Bandage/bandageSerfMBOS.rsi
    state: icon
  - type: Clothing
    sprite: Corvax/Clothing/Bandage/bandageSerfMBOS.rsi
    slots: [ neck ]
  - type: AccessReader
    access:
    - [ "CaesarLegionCenturion" ] # Centurions can always unlock/remove latejoin collars.
    - [ "LegionBrassKey" ] # Existing Legion brass keys also unlock collars.
  - type: Lock
    locked: true
    unlockTime: 2
  - type: LegionSlaveCollar

- type: entity
  parent: NCClothingCollarLegionBase
  id: NCClothingCollarLegionSlave
  name: legion slave collar
  description: A collar used by the Legion slave.
  components:
  - type: Construction # #Misfits Fix: Required for item-construction targets; without this the recipe refunds materials and spawns nothing.
    graph: LegionSlaveCollar
    node: collar
  - type: ClothingFactionAndRoleAdd
    faction: CaesarLegion
    role: CaesarLegionSlave

