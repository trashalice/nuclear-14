#MARK: NCR
- type: entity
  parent: Clothing
  id: NCClothingBandageNCRBase
  abstract: true
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Bandage/bandageNCR.rsi
    state: icon
  - type: Clothing
    sprite: Corvax/Clothing/Bandage/bandageNCR.rsi
    slots: [ bandage ]

- type: entity
  parent: NCClothingBandageNCRBase
  id: NCClothingBandageNCRRecruit
  name: recruit bandage NCR
  description: A bandage used by the NCR recruits.
  components:
  - type: ClothingFactionAndRoleAdd
    faction: NCR
    role: NCRCadet

- type: entity
  parent: Clothing
  id: NCClothingBraceletNCRBase
  abstract: true
  components:
  - type: Sprite
    sprite: Corvax/Clothing/Bandage/bandageNCRPrisonner.rsi
    state: icon
  - type: Clothing
    sprite: Corvax/Clothing/Bandage/bandageNCRPrisonner.rsi
    slots: [ bandage ]
  - type: AccessReader # #Misfits Change: NCR officers can unlock prisoner bracelets via ID card.
    access:
    - [ "NCRLT" ] # Lieutenants can always remove prisoner bracelets.
    - [ "NCRRanger" ] # Rangers can also remove prisoner bracelets.
  - type: Lock # #Misfits Change: Replaces Unremoveable — bracelet is locked on, not truly irremovable.
    locked: true
    unlockTime: 2
  - type: NCRPrisonerBracelet # #Misfits Add: Enables rescue cutting and crafted-key unlock logic.

- type: entity
  parent: NCClothingBraceletNCRBase
  id: NCClothingBraceletNCRPrisoner
  name: NCR Prisoner Bracelet
  description: A bracelet use to track prisoners
  components:
  - type: Construction # #Misfits Fix: Required for item-construction targets; without this the recipe refunds materials and spawns nothing.
    graph: NCRPrisonerBracelet
    node: bracelet
  - type: ClothingFactionAndRoleAdd
    faction: NCR
    role: NCRPrisoner

