- type: entity
  name: mirelurk
  id: N14MobMirelurk
  parent: N14MobBaseHostileInsect
  description: A crab with a shell? That's something new.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: mirelurk
      sprite: Corvax/Mobs/Animals/mirelurk.rsi
  - type: MovementSpeedModifier
    baseWalkSpeed : 3
    baseSprintSpeed : 4
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
            radius: 0.3
        density: 20
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobThresholds
    thresholds:
      0: Alive
      320: Dead
  - type: Reflect # #Misfits Change Tweak: Small-caliber rounds (sub-5.56mm) ricochet off power armor at 30% chance. Innate - always active regardless of movement.
    reflects:
      - SmallCaliber
      - MediumCaliber
    reflectProb: 0.3
    reflectProbByType:
      SmallCaliber: 0.5
      MediumCaliber: 0.4
    innate: true
  - type: DamageStateVisuals
    states:
      Alive:
        Base: mirelurk
      Critical:
        Base: mirelurk
      Dead:
        Base: dead
  - type: MeleeWeapon
    altDisarm: false
    hidden: true
    soundHit:
        path: /Audio/Weapons/Xeno/alien_claw_flesh3.ogg
    angle: 60
    animation: WeaponArcClaw
    wideAnimation: WeaponArcClaw
    damage:
      types:
        Slash: 4
        Piercing: 16
  - type: Butcherable
    spawned:
    - id: N14FoodMeatMirelurkClaw
      amount: 2
      prob: 0.8
  - type: LanguageKnowledge # #Misfits Add - understands common wasteland languages; speaks Crab (crustacean mutations)
    speaks:
    - Crab
    understands:
    - Crab
    - N14Insect
    - English
    - Chinese
    - Latin
    - Tribal
    - N14Robot
    - N14BrotherBeep
    - Sign
  - type: Body # #Misfits Add - override N14Animal with N14PetAnimal to include heart (Medicine/Poison metabolizer)
    prototype: N14PetAnimal
  - type: Hands # #Misfits Add - allows player-controlled mirelurk pets to drag items
  - type: Puller
    needsHands: false
  - type: MisfitsPetNoPickup # #Misfits Add - cancels PickupAttemptEvent; drag only, no item pickup
  - type: PassiveDamage # #Misfits Add - slow natural regeneration for player-controlled pet mirelurks
    allowedStates:
    - Alive
    - Critical
    damageCap: 0
    damage:
      groups:
        Brute: -0.5
        Burn: -0.5
        Toxin: -0.5
        Airloss: -3

- type: entity
  name: rad mirelurk
  id: N14MobRadMirelurk
  parent: N14MobMirelurk
  description: A crab with a shell, and it even glows? That's something new.
  components:
  - type: Sprite
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: radmirelurk
      sprite: Corvax/Mobs/Animals/radmirelurk.rsi
  - type: DamageStateVisuals
    states:
      Alive:
        Base: radmirelurk
      Critical:
        Base: radmirelurk
      Dead:
        Base: dead
  - type: PointLight
    radius: 2
    energy: 2
    color: "#4CBB17FF"
  - type: RadiationSource
    intensity: 0.5
    slope: 0.25
  - type: Butcherable
    spawned:
    - id: N14FoodMeatRadlurkClaw
      amount: 2
      prob: 0.8
