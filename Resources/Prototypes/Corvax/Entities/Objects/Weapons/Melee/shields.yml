- type: entity
  parent: BaseShield
  id: N14LegionnaireShield
  name: legionnaire heater shield #Misfits Change /Fix/: corrected visible name
  description: He had seen worse battles.
  components:
    - type: Reflect # #Misfits Change Add: Metal heater shield deflects sub-5.56mm pistol rounds at 30%; degrades while moving.
      reflects:
        - SmallCaliber
      reflectProb: 0.10 # It is incrediblly cheap as a shield.
      spread: 90
    - type: SpearBlock # #Misfits Change Add: Legionnaire heater shield deflects thrown polearms.
    - type: Construction
      graph: N14LegionnaireShield #Misfits Change /Add/: make shield player-craftable
      node: start
    - type: Sprite
      sprite: Corvax/Objects/Weapons/Melee/romanshield.rsi
      state: icon
    - type: Item
      sprite: Corvax/Objects/Weapons/Melee/romanshield.rsi
      heldPrefix: null
    - type: Clothing
      sprite: Corvax/Objects/Weapons/Melee/romanshield.rsi
      quickEquip: false
      slots:
      - Back
      - suitStorage
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.5
          Slash: 0.5
          Piercing: 0.5
          Heat: 0.5
      activeBlockModifier:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
          Piercing: 0.8
          Heat: 0.8
        flatReductions:
          Blunt: 0.5
          Slash: 0.5
          Piercing: 0.5
          Heat: 1
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 150
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 60 #Weaker shield
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: WoodDestroy
            - !type:SpawnEntitiesBehavior
              spawn:
                MaterialWoodPlank:
                  min: 5
                  max: 5

