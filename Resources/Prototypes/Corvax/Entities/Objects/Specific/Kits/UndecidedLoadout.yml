#Misfits Change /Tweak/: Legion rank loadout kits split by hierarchy so command, line officers, veterans, and recruits no longer share the same spawn box.
# Legion kits
- type: entity
  id: LegionLegateloadoutkits
  name: kit
  description: "please only take one."
  parent: LegionCenturionloadoutkits
  components:
  - type: Sprite
    sprite: Corvax/Objects/Misc/kits.rsi
    state: base
  - type: UndecidedLoadoutBackpack
    possibleSets:
    - LegatePraetorianSet
    - LegateSagitariaSet
    - LegateImperatorSet

- type: entity
  id: LegionCenturionloadoutkits
  name: kit
  description: "please only take one."
  parent: BaseItem
  components:
  - type: Sprite
    sprite: Corvax/Objects/Misc/kits.rsi
    state: base
  - type: UndecidedLoadoutBackpack
    possibleSets:
    - CenturionCommandSet
    - CenturionMarksmanSet
    - CenturionVanquisherSet
  - type: ActivatableUI
    key: enum.UndecidedLoadoutBackpackUIKey.Key
  - type: UserInterface
    interfaces:
      enum.UndecidedLoadoutBackpackUIKey.Key:
        type: UndecidedLoadoutBackpackBoundUserInterface

