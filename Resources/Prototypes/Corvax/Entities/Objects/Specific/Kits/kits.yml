# Legion kits

#Misfits Change /Tweak/: Legion loadout kits were rebalanced to follow the active rank hierarchy from Legate to Recruit.
- type: entity
  name: legate-praetorian kit
  parent: KitBase
  id: KitLegatePraetorian
  description: "A set of Legion equipment."
  components:
  - type: Sprite
    sprite: Corvax/Objects/Misc/kits.rsi
    state: base
  - type: Item
    size: Huge
  - type: SpawnItemsOnUse
    items:
      - id: N14WeaponThermospear
      - id: N14LegionnaireShield
      - id: ClothingBeltRope
      - id: Bola
        amount: 2
      - id: N14HealingPowder #Misfits Change /Tweak/: Legion uses tribal medicine, not stimpaks
        amount: 2
      - id: N14HealingPoultice #Misfits Change /Tweak/: replaces super stimpak
      #- id: N14MedkitCombatFilled #Misfits Change /Remove/: Legion does not use stimpak medkits
      - id: N14FoodTinK
        amount: 2
      - id: N14JunkCeramicFlask
      - id: N14DrinkTeaBroc
    sound:
      path: /Audio/Effects/unwrap.ogg

