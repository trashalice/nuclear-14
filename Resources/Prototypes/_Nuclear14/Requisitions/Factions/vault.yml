- type: entity
  id: N14ASRSAccountVault
  parent: N14ASRSAccount
  name: Vault-Tec requisitions account
  categories: [ HideSpawnMenu ]
  components:
  - type: RequisitionsAccount
    group: Vault
    startingBalance: 6000
    gain: 25

- type: entity
  parent: N14BaseCargoElevator
  id: N14CargoElevatorVault
  suffix: Vault, Lowered
  components:
  - type: RequisitionsElevator
    group: Vault
    accountProto: N14ASRSAccountVault

- type: entity
  parent: N14BaseRequisitionsConsole
  id: N14ASRSConsoleVault
  name: Vault RobCo Supply Terminal
  suffix: Vault
  components:
  - type: AccessReader
    access: [ [ "VaultDweller" ] ]
  - type: RequisitionsComputer
    group: Vault
    accountProto: N14ASRSAccountVault
    acceptedCurrency: PrewarMoney
    sellEntries:
    - item: N14DrinkNukaColaEmpty
      value: 5
    bounties:
    - id: VaultScrapGold
      item: N14ScrapGold
      amount: 15
      rewardCrate: N14CrateRequisitionsVaultPipboy
    categories:
    - name: n14-requisitions-category-apparel
      entries:
      - cost: 200
        crate: N14CrateRequisitionsVaultSuits
      - cost: 200
        crate: N14CrateRequisitionsVaultPacks
    - name: n14-requisitions-category-equipment
      entries:
      - cost: 1500
        stock: 3
        crate: N14CrateRequisitionsVaultPipboy
      - cost: 400
        crate: N14CrateRequisitionsVaultPowerCells
    - name: n14-requisitions-category-security
      entries:
      - cost: 1500
        crate: N14CrateRequisitionsVaultSidearm
      - cost: 1000
        crate: N14CrateRequisitionsVaultSecArmor
      - cost: 500
        stock: 2
        crate: N14CrateRequisitionsVaultLaser
    - name: n14-requisitions-category-maintenance
      entries:
      - cost: 400
        crate: N14CrateRequisitionsVaultTools
    - name: n14-requisitions-category-medical
      entries:
      - cost: 800
        crate: N14CrateRequisitionsVaultMedical
      - cost: 800
        crate: N14CrateRequisitionsVaultChems
      - cost: 1000
        crate: N14CrateRequisitionsVaultSurgical
      - cost: 800
        crate: N14CrateRequisitionsVaultMedkits
    - name: n14-requisitions-category-provisions
      entries:
      - cost: 200
        crate: N14CrateRequisitionsVaultProvisions
      - cost: 200
        crate: N14CrateRequisitionsVaultNuka
      - cost: 200
        crate: N14CrateRequisitionsVaultPizzaParty
      - cost: 200
        crate: N14CrateRequisitionsVaultCanned

