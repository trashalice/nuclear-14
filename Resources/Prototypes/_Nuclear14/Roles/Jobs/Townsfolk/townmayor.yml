- type: job
  id: TownMayor
  setPreference: true
  hideWithoutJobWhitelist: false # #Misfits Tweak - visible in all menus (no whitelist gate)
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - always visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change - allow non-whitelisted players to join
  weight: 100
  overrideConsoleVisibility: false
  canBeAntag: false
  name: job-name-townmayor
  description: job-description-townmayor
  playTimeTracker: TownMayor
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
      - Human
      - Ghoul
      - GhoulGlowing
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - re-enable timelock, 15h Townsfolk requirement
      department: Townsfolk
      min: 54000 # 15 hours
  startingGear: TownMayorGear
  icon: "JobIconTownMayor" # Corvax-Change
  supervisors: job-supervisors-townsfolk
  accessGroups:
  - Townie
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander
          - Townsfolk

- type: startingGear
  id: TownMayorGear
  equipment:
    jumpsuit: N14ClothingUniformJumpsuitCheckered
    ears: MisfitsClothingHeadsetWastelandScrap
    back: N14ClothingBackpackExplorer # Corvax-Change
    shoes: N14ClothingShoesBrown
    id: N14IDBadgeTownMayor
    pocket1: RadioHandheld
    belt: N14WalletLottaCash
  innerClothingSkirt: N14ClothingUniformJumpskirtFalloutBlack
  satchel: N14ClothingBackpackSatchelMayorFilled
  duffelbag: N14ClothingBackpackDuffelMayorFilled
  storage: # Corvax-Change
    back:
    - N14BoxPlasticFilledWastelander

- type: playTimeTracker
  id: TownMayor
