- type: trait
  id: N14Poisoned
  category: Physical
  points: 3
  requirements:
    - !type:CharacterTraitRequirement
      inverted: true
      traits:
        - N14UnnaturalReg
    - !type:CharacterSpeciesRequirement
      species:
        - Human
  functions:
    - !type:TraitReplaceComponent
      components:
        - type: PassiveDamage
          allowedStates:
          - Alive
          - Critical
          damageCap: 200
          damage:
            types:
              Poison: 0.07

- type: trait
  id: N14UnnaturalReg
  category: Physical
  points: -7 # Slight nerf, still able to heal out of crit but its nowhere near as able now.
  requirements:
    - !type:CharacterTraitRequirement
      inverted: true
      traits:
        - N14Poisoned
    - !type:CharacterSpeciesRequirement
      species:
        - Human
  functions:
    - !type:TraitReplaceComponent
      components:
        - type: PassiveDamage
          allowedStates:
          - Alive # Forge-Change
          - Critical # takes a bit to get out of crit, but if no one kills you and you don't lose all your blood, you live!
          damageCap: 300 # makes it works with life giver
          damage:
            types:
              # #Misfits Fix - PassiveDamage group healing is split across member types; direct types make burn regeneration visible. 1 Hp for every 4 seconds
              Blunt: -0.20
              Slash: -0.20
              Piercing: -0.20
              Heat: -0.20
              Shock: -0.20
              Caustic: -0.20
              Asphyxiation: -0.35 # Last longer in crit, takes a WHIIILE to get back up.
              Bloodloss: -0.10
              Poison: -0.10
              Radiation: -0.10

