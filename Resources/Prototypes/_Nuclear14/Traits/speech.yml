- type: trait
  id: N14Stutter
  category: Speech
  requirements:
  - !type:CharacterTraitRequirement
    inverted: true
    traits:
    - N14FrontalLisp
    - N14ScottishAccent
    - N14Liar
    - N14FrenchieAccent
  functions:
  - !type:TraitAddComponent
    components:
    - type: StutteringAccent
      matchRandomProb: 0.1
      fourRandomProb: 0
      threeRandomProb: 0
      cutRandomProb: 0

