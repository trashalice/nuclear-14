# NCR Loadouts
# Rank pins are NOT distributed via loadouts. NCRRankPinSpawnSystem auto-gives
# the correct pin (based on playtime) directly into the player's hand on spawn.
# See: Resources/Prototypes/_Misfits/NCR/ncr_rank_pin_progressions.yml

# ── COSMETIC LOADOUTS ─────────────────────────────────────────────────────────
# Shared cosmetics available to all active NCR roles.

