#! Corvax-Change

# #Misfits Change: Restore a sandstorm weather prototype and point it at the imported Fallout loop.
- type: weather
  id: SandstormHeavyExtreme
  sprite:
    sprite: /Textures/Effects/weather.rsi
    state: sandstorm_heavy
  sound:
    path: /Audio/_Misfits/N14/Weather/sandstorm_loop.ogg
    params:
      loop: true
      volume: -6
  temperature: 400
  duration: 600
  chance: 1
  visibilityClearRadius: 5
  visibilityClearBuffer: 2
  showMessage: true
  sender: weather-announcement
  message: weather-sandstorm-extreme

- type: weather
  id: SnowfallHeavyExtreme
  sprite:
    sprite: /Textures/Effects/weather.rsi
    state: snowfall_heavy
  sound:
    path: /Audio/Effects/Weather/snowstorm.ogg
    params:
      loop: true
      volume: -6
  temperature: 2 # -
  duration: 600
  visibilityClearRadius: 5
  visibilityClearBuffer: 2
  showMessage: true
  chance: 0 # Misfits: admin-only, excluded from random weather pool
  sender: weather-announcement
  message: weather-snowfall-extreme
