- type: entity
  parent: N14WorkbenchBase
  id: N14WorkbenchArmorbench
  description: A workbench with armor working tools for crafting.
  name: armor workbench
  components:
  - type: Construction
    graph: N14WorkbenchArmorbench
    node: WorkbenchArmorbench
  - type: Sprite
    state: armorbench
  # Forge-Change-Start
  - type: ContainerContainer
    containers:
      storagebase: !type:Container
  - type: UserInterface
    interfaces:
      enum.StorageUiKey.Key:
        type: StorageBoundUserInterface
      enum.LatheUiKey.Key:
        type: LatheBoundUserInterface
  # - type: Craftable  # #Misfits Remove: Stalker14 crafting system
  - type: Storage
    craft: true
    maxItemSize: Ginormous
    grid:
    - 0,0,12,9
  # Forge-Change-End
  # Misfits Fix: insertOnInteract is disabled to prevent the MaterialStorage from silently eating
  # raw materials (sheets/ingots/leather) before they can reach the Storage container used by the
  # blueprint-based crafting system (Storage + Craftable). Without this fix, players trying to
  # place SheetSteel or MaterialCloth into the bench for combat-armor recipes would have those
  # items absorbed into the lathe material pool instead of the physical storage container.
  # Trade-off: the bench's lathe recipes (leather/metal armor etc.) can no longer auto-consume
  # materials via direct interaction — materials must be inserted into the Storage UI for crafting,
  # or a dedicated lathe bench should be used for the purely lathe-based recipe set.
  - type: MaterialStorage
    insertOnInteract: false
    whitelist:
      tags:
      - Sheet
      - RawMaterial
      - Ingot
      - RawLeather # move it to the tanning machine
  - type: Lathe
    idleState: icon
    runningState: icon # change this
    staticRecipes:
    # Armor
    - N14ClothingOuterCoatLeatherDuster
    - N14ClothingOuterCoatWinterArmored
    - N14ClothingOuterLeatherArmor
    - N14ClothingOuterChitinArmor
    - N14ClothingOuterPainspike
    - N14ClothingOuterTribalArmorHeavy
    - N14ClothingOuterInsectArmor
    - N14ClothingOuterMetalArmor
    - N14ClothingOuterZealotDuster
    - N14ClothingOuterReinforcedLeatherArmor
    - N14ClothingOuterLightLeatherArmor
    - N14ClothingOuterLeatherRobes
    - N14ClothingOuterBlackRobes
    # Shield's
    - N14InsectShield
    - MakeshiftShield
    - WoodenBuckler
    # Forge-Change-Start
    # Blueprints
    #- N14ClothingOuterCombatArmorBlueprint  # #Misfits Remove: Blueprint recipe deleted with Stalker14 crafting system
    #- N14ClothingOuterCombatArmorMK2Blueprint  # #Misfits Remove: Blueprint recipe deleted with Stalker14 crafting system
    # Forge-Change-End
    # #Misfits Fix: Faction armor blueprint printing recipes REMOVED from staticRecipes.
    # Blueprint items are world-found. Placing one in storage dynamically unlocks the
    # Section-B lathe recipe (in blueprints.yml) for the actual armor. requiresBlueprint:true
    # on those recipes causes them to appear in the Blueprints tab with correct material costs.
    # - N14ClothingOuterMBoSInitiateArmorBlueprint
    # - N14ClothingOuterMidwestArmorBlueprint
    # - N14ClothingOuterMidwestArmorMK2Blueprint
    # - N14ClothingOuterLegionnaireBaseArmorBlueprint
    # - N14ClothingOuterLegionnaireVeteranArmorBlueprint
    # - N14ClothingOuterNCRVestDesertBlueprint
    # - N14ClothingOuterNCRCombatArmorBlueprint
    # - N14ClothingOuterNCRCombatArmorMK2Blueprint
    # Other
    - N14MaterialLeather
    - ClothingBeltQuiver # In misc.yml
    - ClothingBeltQuiverSpear

