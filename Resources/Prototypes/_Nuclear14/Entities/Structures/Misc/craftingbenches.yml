- type: entity
  parent: BaseStructure
  id: N14WorkbenchChemistryset
  description: A chemistry set for crafting drugs and compounds
  name: chemical set
  components:
  - type: Construction
    graph: N14WorkbenchChemistryset
    node: WorkbenchChemistryset
  - type: InteractionOutline
  - type: Sprite
    sprite: _Nuclear14/Structures/Misc/workbenches.rsi
    state: chemicalset
    drawdepth: SmallObjects
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.5,-0.5,0.5,0.5" # Misfit Change
        density: 1500
        mask:
        - TabletopMachineMask
  - type: ActivatableUI
    key: enum.ChemMasterUiKey.Key
  - type: UserInterface
    interfaces:
      enum.ChemMasterUiKey.Key:
        type: ChemMasterBoundUserInterface
  - type: ChemMaster
    pillDosageLimit: 20
  - type: ContainerContainer
    containers:
      beakerSlot: !type:ContainerSlot
      outputSlot: !type:ContainerSlot
  - type: ItemSlots
    slots:
      beakerSlot:
        whitelist:
          components:
          - FitsInDispenser
      outputSlot:
        whitelistFailPopup: chem-master-component-cannot-put-entity-message
        whitelist:
          tags:
          - Bottle
          - PillCanister
  - type: SolutionContainerManager
    solutions:
      buffer:
        maxVol: 1000 # #Misfits Tweak - cap buffer at 150u to prevent super-chem stacking
      pillBuffer:
        maxVol: 1000
  - type: DumpableSolution
    solution: buffer
  - type: Anchorable
  - type: Rotatable

