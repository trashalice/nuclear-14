- type: entity
  parent: BaseStructure
  id: N14WorkbenchBase
  description: A workbench with metal working tools for crafting.
  name: workbench
  abstract: true
  components:
  - type: InteractionOutline
  - type: Appearance
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,0,1.25,0.3"
        density: 3000
        mask:
        - MachineMask
        layer:
        - MachineLayer
  - type: Sprite
    sprite: _Nuclear14/Structures/Misc/workbenches.rsi
    state: workbench
    # Misfit Remove: Fix the offset issue with construction benches
    offset: 0.5, 0
  - type: Lathe
  - type: MaterialStorage
  - type: ActivatableUI
    key: enum.LatheUiKey.Key
  - type: UserInterface
    interfaces:
      enum.LatheUiKey.Key:
        type: LatheBoundUserInterface
  - type: ExtensionCableReceiver
  - type: ApcPowerReceiver
    needsPower: false
  - type: Anchorable
  - type: Rotatable
  - type: Tag
    tags:
    - N14Workbench

