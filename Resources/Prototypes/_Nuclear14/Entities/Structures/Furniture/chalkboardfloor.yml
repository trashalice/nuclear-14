- type: entity
  parent: N14ChalkboardFloor
  id: N14ChalkboardFloor11
  # #Misfits Add - Legion tactical map moved from computer console to this chalkboard
  # so Legion map interaction stays thematic and applies to every N14ChalkboardFloor11 spawn.
  components:
  - type: Sprite
    state: board_text2
  - type: AccessReader
    access: [["CaesarLegionCenturion"]]
  - type: ActivatableUIRequiresAccess
  - type: WastelandMap
    mapTexturePath: _Misfits/Maps/wendover_map.png
    mapTitle: Legion Tactical Map - Wendover
    # #Misfits Fix - Keep the corrected Wendover AABB so Legion blips align with the map image.
    worldBounds: "-517,-308,484,311"
    tacticalFeed: Legion
  - type: ActivatableUI
    key: enum.WastelandMapUiKey.Key
  - type: UserInterface
    interfaces:
      enum.WastelandMapUiKey.Key:
        type: WastelandMapBoundUserInterface
  # End Misfits Add
    
- type: entity
  parent: N14ChalkboardFloor
  id: N14ChalkboardFloor12
  # #Misfits Change - This chalkboard is the expedition board activation point.
  # Opens the expedition GUI instead of being a plain decorative board.
  name: Expedition Board
  description: A dusty chalkboard covered in expedition notes and maps. Interact to plan an expedition.
  suffix: expedition
  components:
  - type: Sprite
    state: board_text3
  - type: N14ExpeditionBoard
    gatherRadius: 7
    launchCountdownSeconds: 10
    cooldownSeconds: 300
  - type: ActivatableUI
    key: enum.N14ExpeditionBoardUiKey.Key
  - type: UserInterface
    interfaces:
      enum.N14ExpeditionBoardUiKey.Key:
        type: N14ExpeditionBoardBoundUserInterface
    
