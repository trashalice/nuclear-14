- type: entity
  abstract: true
  parent: BasePDA
  id: N14BasePipboy
  name: Pip-Boy 3000 MKIV
  description: a RobCo Industries Pip-Boy 3000 Mark IV Personal Information Processor.
  components:
  - type: Sprite
    sprite: _Nuclear14/Objects/Misc/pipboy.rsi
    layers:
    - map: [ "enum.PdaVisualLayers.Base" ]
    - state: "light_overlay"
      map: [ "enum.PdaVisualLayers.Flashlight" ]
      shader: "unshaded"
      visible: false
    - state: "id_overlay"
      map: [ "enum.PdaVisualLayers.IdLight" ]
      shader: "unshaded"
      visible: false
    scale: 0.75, 0.75
  - type: Icon
    sprite: _Nuclear14/Objects/Misc/pipboy.rsi
    state: pda
  - type: PdaBorderColor
    borderColor: "#3a5a40"
  - type: Clothing
    quickEquip: false
    slots:
    - idcard
  - type: Pda
    state: pda
    paiSlot:
      priority: -2
      whitelist:
        components:
        - PAI
    penSlot:
      startingItem: Pen
      priority: -1
      whitelist:
        tags:
        - Write
    idSlot:
      name: access-id-card-component-default
      ejectSound: /Audio/Machines/id_swipe.ogg
      insertSound: /Audio/Machines/id_insert.ogg
      whitelist:
        # #Misfits Change - Faction ID tags: inserting one of these into the Pip-Boy
        # activates the corresponding shared tactical feed in the Pipboy Map cartridge.
        # IdCardVault     -> Vault shared map (VaultMap feed)
        # IdCardBrotherhood -> BOS shared map (Brotherhood feed) - same feed as N14BrotherhoodTacticalmap table and BOS helmets
        # IdCardNCR       -> NCR shared map (NCR feed)
        # IdCardLegion    -> Legion shared map (Legion feed)
        # When adding a new faction map, add its tag here AND define it in _Misfits/tags.yml.
        components:
        - IdCard # #Misfits Add - accept any entity with IdCard component (belt-and-suspenders with tag list)
        tags:
        - IdCardVault # Misfits Change
        - IdCardBrotherhood #Misfits Change
        - IdCardNCR #Misfits Change
        - IdCardLegion # #Misfits Change
        - IdCardEnclave # #Misfits Change
        - IdCardWastelander # #Misfits Add - allows wastelander dogtags to be inserted
  # #Misfits Add - Pip-Boy can read holotapes when they are used on it.
  # Opens the holotape's own UI (not the Pip-Boy's) since the PDA already has its own UserInterface.
  - type: HolotapeReader
  - type: Geiger
    isEnabled: true
    showControl: true
    showExamine: true
    localSoundOnly: false
    audioParameters:
      volume: -4
      maxDistance: 10
      rolloffFactor: 4
  - type: RadiationReceiver
  - type: CartridgeLoader
    preinstalled:
      - CrewManifestCartridge
      - NotekeeperCartridge
      - NewsReaderCartridge
      - NanoChatCartridge
      - PipBoyContactsCartridge   # #Misfits Add - PipBoy Contacts: contact management, SOS beacon
      - PipBoyGroupsCartridge     # #Misfits Add - PipBoy Groups: group chat, waypoints, map tracking
      - PipBoyDirectoryCartridge  # #Misfits Add - PipBoy Directory: network listing, dead drops
      - PipBoySettingsCartridge   # #Misfits Add - PipBoy Settings: visibility, status, password lock
      - PipBoyFactionCartridge    # #Misfits Add - faction roster, alerts, and comms
      - MisfitsWastelandMapCartridge  # #Misfits Change - Pip-Boy shared faction map program

- type: entity
  parent: N14BasePipboy
  id: N14Pipboy

- type: entity
  parent: N14BasePipboy
  id: N14NCRVeteranRangerPipboy
  suffix: NCR Veteran Ranger
  components:
  - type: Pda
    id: N14IDBadgeNCRDesertRangerElite

# #Misfits Add - Wastelander Pip-Boy with pre-inserted dogtags for PipBoy Hub networking.
- type: entity
  parent: N14BasePipboy
  id: N14WastelanderPipboy
  suffix: Wastelander
  components:
  - type: Pda
    id: N14ClothingNeckDogtags

