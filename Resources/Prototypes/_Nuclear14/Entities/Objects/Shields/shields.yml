- type: entity
  name: base shield
  parent: BaseItem
  id: N14BaseShield
  description: Debug item, you shouldn't see it!
  abstract: true
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Melee/shield_light.rsi
      state: icon
    - type: Item
      sprite: _Nuclear14/Objects/Weapons/Melee/shield_light.rsi
      size: Ginormous
    # #Misfits Fix - Add Clothing so metal shields can be equipped to Back / armor suitStorage (matches Legion shield behavior)
    - type: Clothing
      sprite: _Nuclear14/Objects/Weapons/Melee/shield_light.rsi
      quickEquip: false
      slots:
      - Back
      - suitStorage
    - type: Damageable
      damageContainer: Shield
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 50
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:SpawnEntitiesBehavior
              spawn:
                N14Scrap:
                  min: 3
                  max: 3
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.9
          Heat: 0.9
      activeBlockModifier:
        coefficients:
          Blunt: 0.85
          Slash: 0.85
          Piercing: 0.85
          Heat: 0.85
        flatReductions:
          Blunt: 0.5
          Slash: 0.5
          Piercing: 0.5
          Heat: 1
    - type: Reflect # #Made the deflect change 15% to interact with the heavy shields double
      reflectProb: 0.15
      spread: 150
    - type: SpearBlock # #Misfits Change Add: Shields deflect thrown polearms; falls to ground instead of embedding.
    - type: ClothingSpeedModifier
      walkModifier: 0.975
      sprintModifier: 0.975
    - type: HeldSpeedModifier
      mirrorClothingModifier: false
      walkModifier: 0.95
      sprintModifier: 0.95
    - type: StaticPrice
      price: 50

- type: entity
  name: light metal shield
  parent: N14BaseShield
  id: N14ShieldMetalLight
  description: A sheet of metal with some bolts and welds here and there, it can protect you from some damage.
  components:
    - type: Construction
      graph: N14LightShield
      node: start


- type: entity
  name: heavy metal shield
  parent: N14BaseShield
  id: N14ShieldMetalHeavy
  description: A large chunk of metal with screws and fine welds, it can protect you from beast and gunfire.
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Melee/shield_heavy.rsi
    - type: Item
      sprite: _Nuclear14/Objects/Weapons/Melee/shield_heavy.rsi
    # #Misfits Fix - Override Clothing sprite to match heavy shield RSI
    - type: Clothing
      sprite: _Nuclear14/Objects/Weapons/Melee/shield_heavy.rsi
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 100 # Half'd durabillity due to insanely cheap cost
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:SpawnEntitiesBehavior
              spawn:
                N14Scrap:
                  min: 5
                  max: 5
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.85
          Slash: 0.85
          Piercing: 0.9 # Forge-Change
          Heat: 0.85
      activeBlockModifier:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
          Piercing: 0.85 # Forge-Change
          Heat: 0.8
        flatReductions:
          Blunt: 0.5 # Forge-Change
          Slash: 0.5 # Forge-Change
          Piercing: 0.5 # Forge-Change
          Heat: 1 # Forge-Change
    - type: Reflect # # Made reflect to 20 because the shield is insane
      reflectProb: 0.20
      spread: 150
    - type: ClothingSpeedModifier
      walkModifier: 0.85 # Forge-Change
      sprintModifier: 0.85 # Forge-Change
    - type: HeldSpeedModifier
      mirrorClothingModifier: false
      walkModifier: 0.875 # Forge-Change
      sprintModifier: 0.875 # Forge-Change
    - type: Construction
      graph: N14HeavyShield
      node: start

- type: entity
  parent: BaseItem
  id: N14InsectShield
  name: insect shield
  description: A shield made from various pieces of insects.
  components:
    - type: Sprite
      sprite: _Nuclear14/Objects/Weapons/Melee/insectshield.rsi
      state: icon
    - type: Item
      sprite: _Nuclear14/Objects/Weapons/Melee/insectshield.rsi
      size: Large
    - type: Blocking
      passiveBlockModifier:
        coefficients:
          Blunt: 0.9
          Slash: 0.9
          Piercing: 0.9
          Heat: 0.9
      activeBlockModifier:
        coefficients:
          Blunt: 0.8
          Slash: 0.8
          Piercing: 0.8
          Heat: 0.8
        flatReductions:
          Blunt: 1
          Slash: 1
          Piercing: 1
          Heat: 1
    - type: Damageable
      damageContainer: Shield
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 80
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
        - trigger:
            !type:DamageTrigger
            damage: 40 #This is probably enough damage before it breaks
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]
            - !type:PlaySoundBehavior
              sound:
                collection: MetalBreak
            - !type:SpawnEntitiesBehavior
              spawn:
                SheetSteel:
                  min: 2
                  max: 2
                SheetGlass:
                  min: 2
                  max: 2
    - type: StaticPrice
      price: 50
