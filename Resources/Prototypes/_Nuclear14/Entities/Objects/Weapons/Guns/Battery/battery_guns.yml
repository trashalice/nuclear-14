# Developer Note: Naming convention is N14 Weapon Plasma/Laser WeaponType Info/Name

- type: entity
  id: N14BaseWeaponPowerCell
  parent: BaseItem
  abstract: true
  components:
  - type: Sprite
  - type: Item
    size: Large
  - type: AmmoCounter
  - type: Gun
    minAngle: 25
    maxAngle: 60
    angleIncrease: 4
    angleDecay: 16
    fireRate: 1
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser.ogg
  - type: MagazineAmmoProvider
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: N14MicrofusionCell # #Misfits Change - consolidated to single generic MFC
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - N14MicrofusionCell
  - type: Appearance
  - type: StaticPrice
    price: 25
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
  # - type: Craftable  # #Misfits Remove: Stalker14 crafting system

- type: entity
  id: N14BaseWeaponPowerCellSmall
  parent: N14BaseWeaponPowerCell
  abstract: true
  components:
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/taser.rsi
    quickEquip: false
    slots:
    - Belt
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1
  - type: Gun
    availableModes:
    - Semiauto
    minAngle: 1
    maxAngle: 9
    angleIncrease: 0.5
    angleDecay: 4

- type: entity
  id: N14BaseWeaponPowerCellMedium
  parent: N14BaseWeaponPowerCell
  abstract: true
  components:
  - type: Item
    size: Large
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/taser.rsi
    quickEquip: false
    slots:
    - Belt

# MARK: Pistols
- type: entity
  name: AEP-7 laser pistol
