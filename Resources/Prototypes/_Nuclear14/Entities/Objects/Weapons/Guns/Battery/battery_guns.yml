    sprite: _Nuclear14/Objects/Weapons/Guns/Battery/recharger_rifle.rsi
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 25
  - type: Gun
    minAngle: 25 # Corvax-Change
    maxAngle: 60 # Corvax-Change
    angleIncrease: 4 # Corvax-Change
    angleDecay: 16 # Corvax-Change
