    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: HitscanBatteryAmmoProvider
    proto: RedLaser
    fireCost: 50
  - type: FollowDistance
    backStrength: 5
  - type: StaticPrice
    price: 175

