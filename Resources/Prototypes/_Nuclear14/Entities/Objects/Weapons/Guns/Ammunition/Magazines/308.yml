# Misfits Add — SKS 10-round en-bloc clip.
# Legion-refurbished stockpile rifle; uses a slightly larger clip than the Garand.
- type: entity
  id: SKSEnbloc308
  name: "en-bloc clip (SKS, .308)"
  description: A 10-round en-bloc clip for the SKS rifle. Standard-issue ammunition for Legion heavy riflemen in the field.
  parent: BaseMagazine308Rifle
  components:
  - type: Tag
    tags:
      - N14SKSEnbloc308
  - type: BallisticAmmoProvider
    proto: N14Cartridge308Rifle
    capacity: 10
  - type: Sprite
    netsync: false
    sprite: _Nuclear14/Objects/Weapons/Guns/Ammunition/Magazines/garand308.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 1 # #Misfits Fix: RSI only has mag-0 (empty) and mag-1 (loaded); steps:1 maps correctly
    zeroVisible: true
  - type: Appearance

