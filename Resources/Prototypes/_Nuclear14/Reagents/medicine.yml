- type: reagent
  id: SmellingSalts
  name: reagent-name-smelling-salts
  group: Chems
  desc: reagent-desc-smelling-salts
  physicalDesc: reagent-physical-desc-strong-smelling
  color: "#e1f5f4"
  metabolisms:
    Medicine:
      metabolismRate: 0.2 # Slow Acting
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: SmellingSaltsAmbient
        cooldown: 25
        messageKeys:
        - drug-ambience-smelling-salts-1
        - drug-ambience-smelling-salts-2
      - !type:HealthChange # Base Airloss fixing
        damage:
          types:
            Asphyxiation: -5
            Cold: -2
      - !type:HealthChange # Conditional Epinephrine-like bonus on unconscious
        conditions:
        - !type:MobStateCondition
          mobstate: Critical
        - !type:ReagentThreshold
          min: 0
          max: 20
        damage:
          types:
            Asphyxiation: -3
            Poison: -0.5
          groups:
            Brute: -0.5
            Burn: -0.5
      - !type:HealthChange # 20u threshold
        conditions:
        - !type:ReagentThreshold
          min: 20
        damage:
          types:
            Asphyxiation: 3
            Poison: 1
      - !type:GenericStatusEffect
        key: Stun
        time: 0.75
        type: Remove
      - !type:GenericStatusEffect
        key: KnockedDown
        time: 0.75
        type: Remove
      - !type:Jitter
      - !type:ChemVomit
        probability: 0.05

- type: reagent
