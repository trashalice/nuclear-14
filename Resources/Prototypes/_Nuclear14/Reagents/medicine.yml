- type: reagent
  id: RobustHealingMixture #used in super stimpacks
  name: reagent-name-robust-healing-mixture
  group: Chems
  desc: reagent-desc-robust-healing-mixture
  physicalDesc: reagent-physical-desc-opaque
  color: "#934435"
  metabolisms:
    Medicine:
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: RobustHealingMixtureAmbient
        cooldown: 40
        messageKeys:
        - drug-ambience-robust-healing-mixture-1
        - drug-ambience-robust-healing-mixture-2
      - !type:HealthChange
        damage:
          groups:
            Burn: -9 # 150 healing of every type over 50 seconds
            Brute: -9 # 150 healing of every type over 50 seconds
            Airloss: -4.5
      - !type:ModifyBleedAmount
        amount: -3
      - !type:HealthChange # Taking 2 is more or less a guaranteed death
        conditions:
        - !type:ReagentThreshold
          min: 30
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        damage:
          groups:
            Burn: -1.5
            Brute: -1.5
            Airloss: -1.5
          types:
            Poison: 5
            Cellular: 0.75 # permanent damage, be glad you aint dead
      - !type:MovespeedModifier
        walkSpeedModifier: 0.50
        sprintSpeedModifier: 0.50
        conditions:
        - !type:ReagentThreshold
          min: 30
      # !type:Drunk — #Misfits Tweak: Removed. TryAddTime stacks per tick → multi-minute overlay on OD.
      # MovespeedModifier above already communicates the OD state visually.
      # conditions:
      # - !type:ReagentThreshold
      #   min: 30

