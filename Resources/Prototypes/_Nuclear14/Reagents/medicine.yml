#MARK: Healing
- type: reagent
  id: HealingMixture #used in regular stimpacks
  #Misfits Change /Fix:/ aligned metabolism effects list items under the same sequence.
  name: reagent-name-healing-mixture
  group: Chems
  desc: reagent-desc-healing-mixture
  physicalDesc: reagent-physical-desc-soothing
  color: "#934435"
  metabolisms:
    Medicine:
      metabolismRate: 1.0
      effects:
        - !type:AmbientDrugFlavorText
          cooldownId: HealingMixtureAmbient
          cooldown: 45
          messageKeys:
          - drug-ambience-healing-mixture-1
          - drug-ambience-healing-mixture-2
        - !type:HealthChange
          damage:
            groups:
              Burn: -9 # 9/3 = 3 | 3*25 = 75 of every type in 25 seconds.
              Brute: -9 # 9/3 = 3 | 3*25 = 75 of every type in 25 seconds.
              Airloss: -3
        - !type:ModifyBleedAmount
          amount: -2
        - !type:GenericStatusEffect
          conditions:
          - !type:ReagentThreshold
            reagent: HealingMixture
            min: 35
          key: ForcedSleep
          component: ForcedSleeping
          refresh: false
          type: Add

- type: reagent
  id: DirtyStimpak
  name: reagent-name-dirty-stimpak
  group: Chems
  desc: reagent-desc-dirty-stimpak
  physicalDesc: reagent-physical-desc-soothing
  color: "#934435"
  metabolisms:
    Medicine:
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: DirtyStimpakAmbient
        cooldown: 45
        messageKeys:
        - drug-ambience-dirty-stimpak-1
        - drug-ambience-dirty-stimpak-2
      - !type:GenericStatusEffect # Misfits Add: mark entity as having an active recovery drug — enables 2s crit stand-up
        key: RecoveryDrugActive
        component: RecoveryDrugActiveComponent
        type: Add
        time: 3
        refresh: true
      - !type:HealthChange
        damage:
          groups:
            Burn: -2.0
            Brute: -2.0
            Airloss: -2.0
          types:
            Radiation: 0.25
            Poison: 0.25
      - !type:ModifyBleedAmount
        amount: -1
      - !type:HealthChange # to prevent doping
        conditions:
        - !type:ReagentThreshold
          min: 30
        damage:
          groups:
            Burn: -1.0
            Brute: -1.0
            Airloss: -1.0
          types:
            Poison: 0.75
      - !type:HealthChange
        conditions:
        - !type:ReagentThreshold
          min: 50
        - !type:MobStateCondition #Misfits Tweak: OD can push to crit but never kill
        damage:
          types:
            Poison: 1

- type: reagent
  id: HealingPowder
  name: reagent-name-healing-powder
  group: Chems
  desc: reagent-desc-healing-powder
  physicalDesc: reagent-physical-desc-soothing
  color: "#00e5ff"
  metabolisms:
    Medicine:
      metabolismRate: 0.1 # Slow
      effects:
      - !type:AmbientDrugFlavorText
        cooldownId: HealingPowderAmbient
        cooldown: 150 # Misfits Tweak: raised from 55 — was flooding chat when multiple doses stacked
        messageKeys:
        - drug-ambience-healing-powder-1
        - drug-ambience-healing-powder-2
        - drug-ambience-healing-powder-3
      - !type:GenericStatusEffect
        key: HealingPowderHaze
        component: HealingPowderHaze
        type: Add
        time: 14
        refresh: true # Misfits Fix: was false — caused 14s effect to expire then re-add on every metabolism tick, looping the blur forever
      - !type:GenericStatusEffect # Misfits Add: mark entity as having an active recovery drug — enables 2s crit stand-up
        key: RecoveryDrugActive
        component: RecoveryDrugActiveComponent
        type: Add
        time: 3
        refresh: true
      - !type:HealthChange
        damage:
          groups:
            Burn: -1.5
            Brute: -2.5
      - !type:ModifyBleedAmount
        amount: -0.5
      - !type:ChemVomit
        conditions:
        - !type:ReagentThreshold
          min: 30
      - !type:SuppressChronicPainReagent
        SuppressionTime: 300

