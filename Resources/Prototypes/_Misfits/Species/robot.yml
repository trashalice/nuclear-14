  dollPrototype: N14PlayerSyntheticSentryBotMinigun
  skinColoration: Hues
  maleFirstNames: RobotSentryBotFirst
  femaleFirstNames: RobotSentryBotFirst
  naming: First
  # Sentry bots are 2× scale — must match the Sprite component's scale so
  # HumanoidAppearanceSystem doesn't reset it to 1.0 on spawn.
  minHeight: 2.0
  defaultHeight: 2.0
  maxHeight: 2.0
  minWidth: 2.0
  defaultWidth: 2.0
  maxWidth: 2.0

