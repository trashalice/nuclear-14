# #Misfits Add - Gladiator variant of the playable Supermutant role.
# Spawns with an arena-themed outfit while retaining normal whitelist and species restrictions.
- type: job
  id: SuperMutantGladiator
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  name: job-name-supermutant-gladiator
  description: job-description-supermutant-gladiator
  playTimeTracker: SuperMutantGladiator
  icon: JobIconLegionSlave
  supervisors: job-supervisors-caesar-legion-slave
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # #Misfits Change
  hideWithoutWhitelist: true # #Misfits Change
  showBorder: true
  spawnLoadout: true
  applyTraits: true # #Misfits Change - enable perks tab for Supermutants
  startingGear: SuperMutantGladiatorGear
