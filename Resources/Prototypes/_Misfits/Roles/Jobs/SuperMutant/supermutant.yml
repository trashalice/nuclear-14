# Super Mutant job: playable FEV-mutated humanoid role.
# Players spawn directly into the super mutant body via jobEntity.
# Locked behind 9999 hours playtime and whitelist.

- type: job
  id: SuperMutant
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  name: job-name-supermutant
  description: job-description-supermutant
  playTimeTracker: SuperMutant
  icon: JobIconBorg
  supervisors: job-supervisors-supermutant
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # #Misfits Fix — allow job-whitelist fallback in lobby visibility filter
  hideWithoutWhitelist: true # #Misfits Change
  spawnLoadout: true
  startingGear: SuperMutantVaultSuitGear # #Misfits Add - prevents naked spawns
  applyTraits: true # #Misfits Change - enable perks tab for Supermutants
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
        - SuperMutant
  special: # #Misfits Add - register with PlayerSuperMutant faction so Loremaster tab can detect this job
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - PlayerSuperMutant
          - Wastelander


- type: playTimeTracker
  id: SuperMutant

# #Misfits Add - startingGear for the base Supermutant: a vault suit so they don't spawn naked.
- type: startingGear
  id: SuperMutantVaultSuitGear
  equipment:
    jumpsuit: ClothingSuperMutantVaultSuit
    id: N14ClothingNeckDogtags # #Misfits Change - wastelander supermutants get dogtag IDs
    ears: MisfitsClothingHeadsetWastelandScrap

