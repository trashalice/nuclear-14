# #Misfits Add - Gladiator variant of the playable Supermutant role.
# Spawns with an arena-themed outfit while retaining normal whitelist and species restrictions.
- type: job
  id: SuperMutantGladiator
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  name: job-name-supermutant-gladiator
  description: job-description-supermutant-gladiator
  playTimeTracker: SuperMutantGladiator
  icon: JobIconBorg
  supervisors: job-supervisors-supermutant
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # #Misfits Change
  hideWithoutWhitelist: true # #Misfits Change
  spawnLoadout: true
  applyTraits: true # #Misfits Change - enable perks tab for Supermutants
  startingGear: SuperMutantGladiatorGear
  requirements:
    - !type:CharacterSpeciesRequirement
      species:
        - SuperMutant
  special: # #Misfits Add - register with PlayerSuperMutant faction so Loremaster tab can detect this job
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - PlayerSuperMutant
          - CaesarLegion
  - !type:AddTraitSpecial
    traits: [ LanguageLatin ]
- type: startingGear
  id: SuperMutantGladiatorGear
  equipment:
    ears: N14ClothingHeadsetLegion
    jumpsuit: ClothingSuperMutantGladiatorLoincloth
    outerClothing: ClothingSuperMutantGladiatorArmor
    shoes: ClothingSuperMutantGladiatorBoots
    head: ClothingSuperMutantGladiatorHelmet
    id: N14IDLegionaryBadgeSlave # Gladiator serves under Legion authority
    back: N14ClothingBackpackMilitary # #Misfits Add - backslot for storing a secondary weapon
    suitstorage: N14WastelandTribalSpear # #Misfits Add - back holster slot; starts with a spear stowed on the back
  inhand:
    - N14WastelandTribalSpear # Starts with a tribal spear for close-combat

- type: playTimeTracker
  id: SuperMutantGladiator

