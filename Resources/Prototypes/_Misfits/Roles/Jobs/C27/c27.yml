# C-27 Humanoid Robot — department + jobs + playtime tracker. #Misfits Add (Phase G)
# Mirrors the Synthetics/SuperMutant whitelist-only species-job pattern.
#
# #Misfits Change - Split the original single C27 job into three sibling jobs so each
# faction variant appears as its own entry in the admin role-whitelist UI:
#   C27     → C-27 Humanoid Robot (Unassigned)  — chassis jumpsuit only, no faction kit
#   C27NCR  → C-27 NCR Humanoid Robot           — NCR Light kit + headset + dogtag
#   C27BoS  → C-27 Brotherhood Humanoid Robot   — BoS Light kit + headset + holotag
# All three share the C27 playTimeTracker so playtime + bypass-role-timer behaviour
# stays unified, and all three register the PlayerRobot faction.

- type: department
  id: C27Unit
  description: department-C27Unit-description
  color: "#8a96a3" # light brushed-steel grey, distinct from Robots (#607d8b)
  # #Misfits Tweak - lowered weight from -100 to -102 so the lobby UI sorts
  # Robots/FEVMutants (-100) and Enclave (-101) between CaesarLegion (-99) and
  # C27Unit, matching the visual margin/spacing of the other special departments.
  weight: -102
  uiCategory: Whitelist
  roles:
  - C27       # #Misfits Change - was the only role; now joined by C27NCR / C27BoS below.
  - C27NCR    # #Misfits Add - NCR variant role
  - C27BoS    # #Misfits Add - Brotherhood variant role

# --- Generic / Unassigned variant ----------------------------------------------------
- type: job
  id: C27
  name: job-name-c27
  description: job-description-c27
  playTimeTracker: C27
  icon: JobIconBorg
  supervisors: job-supervisors-c27
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # admin job whitelist required (jobwhitelistadd <player> C27)
  hideWithoutWhitelist: true
  jobWhitelistBypassesRoleTimers: true
  spawnLoadout: true # #Misfits Tweak (Phase H revised) - loadout tab re-enabled via allowedLoadoutCategories on species
  applyTraits: true # allow trait/perk picks like SuperMutant
  startingGear: C27GearGeneric # #Misfits Change - was C27Gear (subGear dispatch); now per-job direct gear
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27 # Generic / Unassigned model only — NCR and BoS variants live on their own jobs
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander

# --- NCR variant ---------------------------------------------------------------------
- type: job
  id: C27NCR # #Misfits Add - distinct whitelist entry for NCR-aligned C-27 chassis
  name: job-name-c27-ncr
  description: job-description-c27-ncr
  playTimeTracker: C27NCR # #Misfits Tweak - unique tracker required (1:1 with job ID)
  icon: JobIconBorg
  supervisors: job-supervisors-c27
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # admin job whitelist required (jobwhitelistadd <player> C27NCR)
  hideWithoutWhitelist: true
  jobWhitelistBypassesRoleTimers: true
  spawnLoadout: true
  applyTraits: true
  access: # #Misfits Fix - stamp NCR door access onto the spawned dogtag for the NCR C-27 variant.
  - NCR
  startingGear: C27GearNCR
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27NCR
  # #Misfits Tweak - SharedJobSystem requires a unique PlayTimeTracker per job; override here.
  # (Was sharing tracker 'C27' with the other two siblings, which crashed startup.)
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - NCR

# --- Brotherhood of Steel variant ----------------------------------------------------
- type: job
  id: C27BoS # #Misfits Add - distinct whitelist entry for Brotherhood-aligned C-27 chassis
  name: job-name-c27-bos
  description: job-description-c27-bos
  playTimeTracker: C27BoS # #Misfits Tweak - unique tracker required (1:1 with job ID)
  icon: JobIconBorg
  supervisors: job-supervisors-c27
  canBeAntag: false
  setPreference: true
  overrideConsoleVisibility: true
  whitelisted: true # admin job whitelist required (jobwhitelistadd <player> C27BoS)
  hideWithoutWhitelist: true
  jobWhitelistBypassesRoleTimers: true
  spawnLoadout: true
  applyTraits: true
  accessGroups: # #Misfits Fix - stamp Brotherhood door access onto the spawned holotag for the BoS C-27 variant.
  - BOSInitiate
  startingGear: C27GearBoS
  requirements:
  - !type:CharacterSpeciesRequirement
    species:
    - C27BoS
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - BrotherhoodOfSteel

