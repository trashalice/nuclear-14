# Generic / Unassigned: chassis jumpsuit only.
- type: startingGear
  id: C27GearGeneric
  equipment:
    jumpsuit: ClothingC27Chassis
    id: N14ClothingNeckDogtags

# NCR: chassis jumpsuit + Light NCR kit + NCR headset + NCR soldier dogtag.
- type: startingGear
  id: C27GearNCR
  equipment:
    jumpsuit: ClothingC27Chassis
    pocket1: C27NCRLoadoutKit
    ears: N14ClothingHeadsetNCR
    id: N14IDNCRDogtagSoldier

# Brotherhood: chassis jumpsuit + Light BoS kit + BoS headset + BoS Initiate holotag.
- type: startingGear
  id: C27GearBoS
  equipment:
    jumpsuit: ClothingC27Chassis
    pocket1: C27BoSLoadoutKit
    ears: N14ClothingHeadsetBrotherhoodOfSteel
    id: N14IDBrotherhoodOfSteelHolotagInitiate

- type: playTimeTracker
  id: C27

# #Misfits Add - per-variant trackers (SharedJobSystem enforces unique tracker per job).
