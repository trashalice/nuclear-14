- type: job
  id: RangerChief #admin lead
  setPreference: false
  alwaysUseSpawner: true
  name: job-name-ranger-chief
  description: job-description-ranger-chief
  playTimeTracker: RangerChief
  # #Misfits Tweak - Weight set to 0; rank not actively used, prevents blocking war declarations
  weight: 0
  startingGear: RangerChiefGear
  icon: "JobIconCaptain"
  requireAdminNotify: true
  canBeAntag: false
  accessGroups:
  - NCR
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Rangers
  # #Misfits Removed - Disabled auto-grant pending testing; use training manuals instead
  #- !type:AddComponentSpecial
  #  components:
  #    - type: GrantRangerCombat
  requirements:
    - !type:CharacterWhitelistRequirement
    - !type:CharacterSpeciesRequirement # #Misfits Change - robots and super mutants cannot be Rangers
      inverted: true
      species:
      - RobotMrHandy
      - RobotProtectron
      - RobotProtectronPolice # #Misfits Fix - missing variant species
      - RobotProtectronBuilder # #Misfits Fix - missing variant species
      - RobotProtectronFire # #Misfits Fix - missing variant species
      - RobotMrGutsy
      - RobotAssaultron
      - RobotAssaultronTesla # #Misfits Fix - missing variant species
      - RobotSentryBot # #Misfits Fix - missing robot chassis
      - RobotSentryBotLaser # #Misfits Fix - missing variant species
      - RobotRobobrain # #Misfits Fix - missing robot chassis
      - RobotRobobrainLaser # #Misfits Fix - missing variant species
      - SuperMutant
      - Nightkin

- type: startingGear
  id: RangerChiefGear
  equipment:
    head: N14ClothingHeadHatRangerHelmetElite
    back: N14ClothingBackpackMilitary # Corvax-Change
    jumpsuit: N14ClothingUniformRangerVeteran
    ears: N14ClothingHeadsetNCR
    shoes: N14ClothingBootsCombatMK2Filled
    gloves: N14ClothingHandsGlovesCombat
    belt: ClothingBeltRevolvervetfilled
    mask: ClothingMaskGasRangerElite
    pocket1: MagazineBox45-70
    pocket2: FlashlightSeclite
    eyes: ClothingEyesGlassesSunglasses
    outerClothing: N14ClothingOuterRangerElite
    id: N14IDBadgeNCRDesertRangerChief
  innerClothingSkirt: N14ClothingUniformRangerVeteran #placeholder
  satchel: N14ClothingBackpackSatchelMilitaryFilled
  duffelbag: N14ClothingBackpackDuffelMilitaryFilled
  storage: # Corvax-Change
    back:
    - N14BoxPlasticFilledMilitary

- type: playTimeTracker
  id: RangerChief
