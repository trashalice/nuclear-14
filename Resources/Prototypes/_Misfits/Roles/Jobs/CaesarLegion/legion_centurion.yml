- type: job
  id: CaesarLegionCenturion
  setPreference: true
  hideWithoutJobWhitelist: false # #Misfits Tweak - visible in all menus
  hideIfPlaytimeRequirementsNotMet: false # #Misfits Tweak - all jobs visible in selection
  jobWhitelistBypassesRoleTimers: true # #Misfits Change
  weight: 190
  name: job-name-caesar-legion-centurion
  description: job-description-caesar-legion-centurion
  playTimeTracker: CaesarLegionCenturion
  requirements:
    - !type:CharacterDepartmentTimeRequirement # #Misfits Tweak - T7 faction timelock (40h Legion)
      department: CaesarLegion
      min: 144000 # 40 hours
    - !type:CharacterSpeciesRequirement
      species:
      - Human
    - !type:CharacterSexRequirement
      sex: Male
    - !type:CharacterGenderRequirement
      gender: Male
  startingGear: CaesarLegionCenturionGear
  alwaysUseSpawner: true
  icon: "JobIconlegionerCenturion"
  supervisors: job-name-caesar-legion
  canBeAntag: false
  accessGroups:
  - CaesarLegionCenturion
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - CaesarLegion
      - type: ReplacementAccent
        accent: latin
      - type: Warcry
        action: ActionLegionWarcry
        targetDepartment: CaesarLegion
        range: 6
        speedBonus: 0.30 # #Misfits Tweak - reduced from 0.50, was too strong
        duration: 10
        overlayColor: "#D64545"
        speechVerb: MisfitsLegionWarcry
        warcryMessage: warcry-message-legion
        warcryMessageCount: 6
        buffPopup: warcry-popup-buffed-legion
        excludedJobs:
        - SuperMutantGladiator
        cautionPopup: true
        activatorJobs:
        - CaesarLegionDean
        - CaesarLegionPrimeDecanus
        - CaesarLegionVeteranDecanus
        - CaesarLegionCenturion
        - CaesarLegionLegate
        - CaesarLegionOptio
        - CaesarLegionPriestessOfMars
  - !type:AddTraitSpecial
    traits: [ LanguageLatin ]
  # #Misfits Removed - Disabled auto-grant pending testing; use training manuals instead
  #- !type:AddComponentSpecial
  #  components:
  #    - type: GrantLegionGladiatorial

- type: startingGear
  id: CaesarLegionCenturionGear
  equipment:
    jumpsuit: N14ClothingUniformJumpsuitLegionnaire
    ears: N14ClothingHeadsetLegion
    neck: ClothingNeckBlackScarf
    eyes: N14ClothingEyesGlassesWelding
    back: N14ClothingBackpackMilitary
    shoes: N14ClothingBootsCenturion
    # #Misfits Change - head and outerClothing removed; armor kit (pocket2) now provides both helmet + armor so Centurion can choose their variant
    gloves: N14ClothingHandsGlovesCenturion
    belt: N14Gladius
    pocket1: LegionCenturionloadoutkits
    pocket2: LegionCenturionArmorloadoutkits  # #Misfits Add - armor selection kit: Standard / Paladin-Slayer / Ranger-Hunter
    id: N14IDLegionaryMedalGold
  innerClothingSkirt: N14ClothingUniformJumpsuitLegionnaireOther
  storage:
    back:
    - N14BoxPlasticFilledMilitaryLegion #Misfits Change /Tweak/: Legion uses tribal medicine, not stimpaks
    - N14HealingPowder
    - N14WeaponPistol10mmPipe  # #Misfits Change - moved from pocket2 to storage; pocket2 now holds armor kit

- type: playTimeTracker
  id: CaesarLegionCenturion
