    - RobotProtectronPolice # #Misfits Add: model variant shares Protectron whitelist/job.
    - RobotProtectronBuilder # #Misfits Add: model variant shares Protectron whitelist/job.
    - RobotProtectronFire # #Misfits Add: model variant shares Protectron whitelist/job.
  special: # #Misfits Add - register with PlayerRobot faction so Loremaster tab can detect this job
