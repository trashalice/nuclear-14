# #Misfits Add - Followers of the Apocalypse department and ranked jobs.
# Replaces the single upstream Followers job (now commented out in _Nuclear14/Roles/Jobs/Fun/followers.yml).
# Hierarchy: Follower Head > Follower Doctor > Follower Volunteer

- type: department
  id: FollowersOfTheApocalypse
  description: department-FollowersOfTheApocalypse-description
  color: "#e8a838"
  uiCategory: MinorFaction
  roles:
  - FollowerHead
  - FollowerDoctor
  - FollowerVolunteer
  - SuperMutantFollowerDoctor

# ─── Follower Head ────────────────────────────────────────────────────────────
- type: job
  id: FollowerHead
  setPreference: true
  jobWhitelistBypassesRoleTimers: true
  weight: 110
  displayWeight: 115
  requireAdminNotify: true
  canBeAntag: false
  name: job-name-follower-head
  description: job-description-follower-head
  playTimeTracker: FollowerHead
  startingGear: FollowerHeadGear
  icon: "JobIconPassenger"
  supervisors: job-supervisors-follower-head
  accessGroups:
  - FollowersApocalypse
  - FotAHead
  - FotADoctor
  - FotA
  requirements:
  - !type:CharacterPlaytimeRequirement
    tracker: FollowerDoctor
    min: 36000 # 10 hours as Follower Doctor
  - !type:CharacterDepartmentTimeRequirement
    department: FollowersOfTheApocalypse
    min: 54000 # 15 hours in faction
  - !type:CharacterSpeciesRequirement
    inverted: true
    species:
    - RobotMrHandy
    - RobotMrGutsy
    - RobotProtectron
    - RobotProtectronPolice
    - RobotProtectronBuilder
    - RobotProtectronFire
    - RobotAssaultron
    - RobotAssaultronTesla
    - RobotSentryBot
    - RobotSentryBotLaser
    - RobotRobobrain
    - RobotRobobrainLaser
    - SuperMutant
    - Nightkin
  special:
  - !type:AddComponentSpecial
    components:
      - type: NpcFactionMember
        factions:
          - Wastelander
          - Followers # #Misfits Add - enables Followers death-alert targeting
      - type: CPRTraining
  - !type:AddTraitSpecial
    traits:
    - FiremanCarry

- type: startingGear
  id: FollowerHeadGear
  equipment:
    jumpsuit: N14ClothingUniformJumpsuitFollowers
    back: ClothingBackpackDuffelSurgeryFilled
    shoes: N14ClothingBootsLeather
    neck: ClothingNeckStethoscope
    id: N14IDFollowerHead
    ears: N14ClothingHeadsetFollowers
    outerClothing: N14ClothingOuterCoatFollowerLab
    belt: N14ClothingBeltMedicalFilled
    pocket1: SurgicalSterilanSpray
    pocket2: N14HandheldHealthAnalyzer
    head: ClothingHeadHatBeretMedic
  innerClothingSkirt: N14ClothingUniformJumpskirtFalloutBlack
  satchel: N14ClothingBackpackSatchelWastelanderFilled
  duffelbag: N14ClothingBackpackDuffelFilled

- type: playTimeTracker
  id: FollowerHead

