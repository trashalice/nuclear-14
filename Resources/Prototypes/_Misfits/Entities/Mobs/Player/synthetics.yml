  - type: BasicEntityAmmoProvider # cryo bursts: slower recharge than the laser — cryo emitter is a utility tool not a spam weapon
    proto: BulletCryo
    capacity: 6
    count: 6
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 3
    rechargeSound:
      path: /Audio/Effects/extinguish.ogg
  - type: ContainerFill # #Misfits Change: cryo + extinguisher loadout; water extinguisher kept for traditional fire suppression
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleFireExtinguisher # traditional water/CO2 extinguisher for structural fires
        - N14BorgModuleCryo          # holdable cryo emitter module for field use
      id:
        - MisfitsRobotNavCardRobCo
      ears: # #Misfits Fix - vault comms: wasteland + vault radio for vault-assigned robot
        - MisfitsClothingHeadsetRobotVault

