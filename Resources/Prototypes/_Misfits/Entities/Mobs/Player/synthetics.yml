- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticAssaultron
  name: assaultron
  suffix: player, synthetic
  description: A RobCo Industries Assaultron combat robot, now guided by a living mind. Fast, deadly, and built for warfare.
  components:
  - type: HumanoidAppearance
    species: RobotAssaultron
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/assaultron.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: on # #Misfits Fix: lit indicator; BorgSystem overrides at runtime
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: on # #Misfits Fix: 'on' RSI state is the lit variant used as the flashlight glow overlay
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  # #Misfits Change: Disabled idle/aggro auto-sounds for player-controlled robots — sounds fire uncontrollably while the player is present
  # - type: IdleSound
  # - type: SpamEmitSound
  #   minInterval: 15
  #   maxInterval: 50
  #   sound:
  #     collection: N14AssaultronIdle
  #     params:
  #       volume: -7
  #       maxDistance: 6
  - type: MovementSpeedModifier
    baseWalkSpeed: 3.0
    baseSprintSpeed: 6.0
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14AssaultronAttack
    angle: 0
    animation: WeaponArcPunch
    range: 1.5
    damage:
      types:
        Slash: 30 # #Misfits Tweak: player assaultrons should match the NPC claw damage profile
  - type: Gun # #Misfits Add: Assaultron head laser — devastating focused heat beam
    minAngle: 1
    maxAngle: 6
    angleIncrease: 2
    angleDecay: 4
    fireRate: 2 # Polling rate while held — actual ROF gated by AssaultronBeamCharge (2s charge + 3s cooldown = ~5s cycle)
    shootOffset: 0, 0.35 # Shift beam origin up from body center to head level
    soundGunshot: # #Misfits Add: custom assaultron beam sound
      path: /Audio/_Misfits/Weapons/Guns/assaultron_beam.ogg
    useKey: false
    selectedMode: FullAuto # FullAuto so the gun polls continuously while held, charge system controls timing
    availableModes:
      - FullAuto
  - type: AssaultronBeamCharge # #Misfits Add: 2-second charge-up before beam fires, 3-second cooldown after
    chargeDuration: 2
    cooldownDuration: 3
    fireDrainCharge: 270 # #Misfits Add: 20% of PowerCellHyper (1800) per shot
  - type: HitscanBatteryAmmoProvider # #Misfits Change: battery pool large enough for continuous fire — beam availability tied to chassis power cell
    proto: N14AssaultronHeadLaser
    fireCost: 100
  - type: Battery
    maxCharge: 99999
    startingCharge: 99999
  - type: BatterySelfRecharger # #Misfits Change: fast recharge — effectively unlimited as long as the chassis power cell keeps the robot alive
    autoRecharge: true
    autoRechargeRate: 9999
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
        Caustic: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups

  - type: Tag # #Misfits Change: Assaultron walks, so it should have footstep sounds
    tags:
    - DoorBumpOpener
    - CanPilot
    - FootstepSound
  - type: FootstepModifier # #Misfits Add: metal footsteps instead of human barefoot sounds
    footstepSoundCollection:
      collection: N14FootstepMetalSolid
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCardRobCo # RobCo Industries Navigation
      ears: # Wasteland radio for inter-robot and faction communication
        - MisfitsClothingHeadsetWastelandScrap
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper

# ────────────────────────────────────────────────────────
# Assaultron — Tesla variant (model picker variant of RobotAssaultron)
# Same chassis and speed as the beam variant, but fires a tesla energy ball
# with chain-lightning arcs instead of a focused heat beam.
# ────────────────────────────────────────────────────────

- type: entity
  parent: N14PlayerSyntheticAssaultron
  id: N14PlayerSyntheticAssaultronTesla
  name: assaultron
  suffix: player, synthetic, tesla
  description: A RobCo Industries Assaultron combat robot retrofitted with a Tesla discharge emitter. Fires arcing electrical orbs that chain-lightning nearby targets.
  components:
  - type: HumanoidAppearance
    species: RobotAssaultronTesla
  - type: Gun # Tesla fires slower but the chain lightning compensates
    minAngle: 1
    maxAngle: 6
    angleIncrease: 2
    angleDecay: 4
    fireRate: 2
    shootOffset: 0, 0.35 # Shift projectile origin up from body center to head level
    soundGunshot:
      collection: N14LaserAutoRifleGunshot
    useKey: false
    selectedMode: FullAuto
    availableModes:
      - FullAuto
  - type: AssaultronBeamCharge # Same charge cycle as the beam variant
    chargeDuration: 2
    cooldownDuration: 3
    chargeEmoteLocale: assaultron-tesla-charge-emote
    fireEmoteLocale: assaultron-tesla-fire-emote
    fireDrainCharge: 900 # 50% of PowerCellHyper (1800) — tesla shot is devastating but costly
  - type: ProjectileBatteryAmmoProvider # Fires TeslaGunBullet — chain-lightning energy ball
    proto: TeslaGunBullet
    fireCost: 100
  - type: HitscanBatteryAmmoProvider # Override parent's beam hitscan — this variant fires projectiles only
    proto: N14AssaultronHeadLaser
    fireCost: 999999 # Effectively disabled — cost exceeds battery so hitscan never fires

# ────────────────────────────────────────────────────────
# Sentry Bot — Minigun variant (base sentry bot species default)
# Heavy assault platform with built-in 5mm minigun, missile launcher, and heavy armor.
# Trades speed for firepower and durability. 50% reflect on all projectile types.
# ────────────────────────────────────────────────────────

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticSentryBotMinigun
  name: sentry bot
  suffix: player, synthetic, minigun
  description: A pre-war military Sentry Bot armed with a 5mm minigun and missile launcher. Massively armored, terrifyingly slow, and built to annihilate everything in its path.
  components:
  - type: HumanoidAppearance
    species: RobotSentryBot
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/sentrybot.rsi
    scale: 2.0, 2.0
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: on # #Misfits Fix: lit indicator; BorgSystem overrides at runtime
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: on # #Misfits Fix: 'on' RSI state is the lit variant used as the flashlight glow overlay
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: MovementSpeedModifier # Sentry bots are extremely slow
    baseWalkSpeed: 1.0
    baseSprintSpeed: 1.5
  - type: MobThresholds # Heavy-class robot — much more durable than standard borgs
    thresholds:
      0: Alive
      350: Dead
    allowRevives: true
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: N14HeavyRobot
  - type: Armor # #Misfits Add: innate heavy plating on top of HeavyRobot modifier set
    modifiers:
      coefficients:
        Blunt: 0.65
        Slash: 0.65
        Piercing: 0.60
        Heat: 0.60
  - type: ExplosionResistance # #Misfits Add: sentry bots shrug off most explosions
    damageCoefficient: 0.50
  - type: Reflect # #Misfits Add: 50% reflect on all projectile types — sentry bot heavy plating
    innate: true
    reflectProb: 0.5
    spread: 150
    reflects:
    - NonEnergy
    - Energy
    - SmallCaliber
    - MediumCaliber
  - type: NoPull # Too heavy to drag
  # Sentry bot 360-degree red glow — spawns 4 cone PointLight emitters at cardinal
  # rotations on init (matching the NPC sentry bot). Also drives overload flash.
  - type: SentryBotOverloadLight
    steadyLightEnabled: true
    flashInterval: 0.35
  # Required on the main entity so SentryBotOverloadLightSystem's Update() query
  # (which requires both SentryBotOverloadLightComponent and PointLightComponent) runs.
  - type: PointLight
    enabled: false
    radius: 0
    softness: 0
  - type: Gun # #Misfits Add: built-in 5mm minigun — fires in bursts, then overheats
    minAngle: 5
    maxAngle: 20
    angleIncrease: 5
    angleDecay: 8
    fireRate: 8
    soundGunshot:
      collection: N14MinigunGunshot
    useKey: false
    selectedMode: FullAuto
    availableModes:
      - FullAuto
  - type: BasicEntityAmmoProvider # #Misfits Add: limited magazine — overheat system refills after cooldown
    proto: N14Bullet5mm
    capacity: 30
    count: 30
  - type: SentryBotChassis # #Misfits Add: enables overheat cooldown + missile launch action
    overheatDuration: 5
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Add: sentry bots self-repair slowly
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
        Caustic: -0.5
  - type: RobotSelfRepairAnnouncer
  - type: Tag
    tags:
    - DoorBumpOpener
    - CanPilot
    # No FootstepSound — sentry bots move on wheels/treads, not feet
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleTool
      id:
        - MisfitsRobotNavCardRobCo
      ears: # Wasteland radio for inter-robot and faction communication
        - MisfitsClothingHeadsetWastelandScrap
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellHyper
  # #Misfits Fix: override base chassis Destructible so the player SentryBot behaves like
  # the NPC variants — the chassis stays in Dead state after the damage threshold fires,
  # then the TriggerOnMobstateChange explosion below destroys it 8 seconds later.
  # DoActsBehavior: Destruction is intentionally absent (explosion handles cleanup).
  # borg_brain is excluded from EmptyContainersBehaviour so the brain is destroyed
  # with the chassis rather than dropped as a lootable item on the floor.
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/AI/borg_death.ogg
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:SpawnEntitiesBehavior
        spawn:
          PowerCellHyper:
            min: 1
            max: 1
          N14Scrap1:
            min: 2
            max: 4
          N14ScrapElectronic1:
            min: 1
            max: 3
      - !type:EmptyContainersBehaviour
        containers:
        - borg_module
        - cell_slot
        # borg_brain intentionally omitted — destroyed with chassis in the explosion below
  # #Misfits Add: death explosion matching the NPC SentryBot — 8-second beeping fuse
  # triggered when the chassis enters Dead mob state, then fires a structural explosion.
  - type: TriggerOnMobstateChange
    mobState:
    - Dead
  - type: OnUseTimerTrigger
    delay: 8
    initialBeepDelay: 0
    beepInterval: 1
    beepSound:
      path: /Audio/Machines/Nuke/general_beep.ogg
      params:
        volume: -2
  - type: ExplodeOnTrigger
  - type: Explosive
    explosionType: N14DefaultStructural
    maxIntensity: 4
    intensitySlope: 4
    totalIntensity: 24
    canCreateVacuum: false

# ────────────────────────────────────────────────────────
# Sentry Bot — Laser Gatling variant
# Same heavy chassis as minigun variant but armed with a gatling laser.
# ────────────────────────────────────────────────────────

- type: entity
  parent: N14PlayerSyntheticSentryBotMinigun
  id: N14PlayerSyntheticSentryBotLaser
  name: sentry bot
  suffix: player, synthetic, laser gatling
  description: A pre-war military Sentry Bot armed with a gatling laser and missile launcher. Massively armored, terrifyingly slow, and built to annihilate everything in its path.
  components:
