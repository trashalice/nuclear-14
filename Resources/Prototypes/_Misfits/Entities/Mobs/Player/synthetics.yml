- type: entity
  parent: N14PlayerSyntheticProtectron
  id: N14PlayerSyntheticProtectronPolice
  name: protectron police
  suffix: player, synthetic, police
  description: A RobCo Industries Protectron police model specialising in close-quarters detainment. Equipped with a heavy electro-shock melee strike, a stun baton, and restraint tools. No ranged weapons — this unit subdues, not suppresses.
  components:
  - type: HumanoidAppearance
    species: RobotProtectronPolice
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/protectron-police.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: on # #Misfits Fix: lit indicator; BorgSystem overrides at runtime
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: on # #Misfits Fix: 'on' RSI state is the lit variant used as the flashlight glow overlay
      shader: unshaded
      map: ["light"]
      visible: false
  # #Misfits Removed - Police Protectrons are melee-only per Fallout lore; no ranged weapons
  # - type: Gun
  #   minAngle: 9
  #   maxAngle: 18
  #   angleIncrease: 3
  #   angleDecay: 4
  #   fireRate: 1
  #   soundGunshot:
  #     collection: N14RechargerRifleGunshot
  #   useKey: false
  #   selectedMode: SemiAuto
  #   availableModes:
  #     - SemiAuto
  # - type: BasicEntityAmmoProvider
  #   proto: BulletLaser
  #   capacity: 9
  #   count: 9
  # - type: RechargeBasicEntityAmmo
  #   rechargeCooldown: 2
  #   rechargeSound:
  #     path: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
  - type: MeleeWeapon # #Misfits Add: electro-shock close combat — Fallout Police Protectron uses powerful melee strikes and painful electric shock
    hidden: true
    soundHit:
      path: /Audio/Effects/sparks4.ogg
    angle: 0
    animation: WeaponArcPunch
    range: 1.5
    damage:
      types:
        Blunt: 10  # moderate impact force
        Shock: 12  # painful electric discharge — the signature Police Protectron incapacitation tool
  - type: ContainerFill # #Misfits Change: security module provides stun baton, cuffs, and flashlight for patrol and detainment
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - N14BorgModuleSecurity # stun baton, handcuffs, flashlight - lore-accurate detainment kit
      id:
        - MisfitsRobotNavCardRobCo
      ears: # #Misfits Fix - vault comms: wasteland + vault radio for vault-assigned robot
        - MisfitsClothingHeadsetRobotVault

