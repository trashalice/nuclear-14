# Player-controlled Synthetic robots for the Misfits server.
# These inherit directly from N14BaseRobotChassis so they do NOT have the
# GhostRole component that pre-placed map robots carry.

- type: entity
  parent: N14BaseRobotChassis
  id: N14BasePlayerSynthetic
  abstract: true
  components:
  - type: RobotWeaponPickupBlacklist # #Misfits Add: player robot species keep hands for utility items but cannot grab loose weapons.
    blacklist:
      components:
      - Gun
  - type: Appearance # #Misfits Change: allow robot sprites to swap to their built-in dead state
  - type: DamageStateVisuals # #Misfits Change: use robot dead sprites instead of animated hover frames when downed/dead
    states:
      Alive:
        Base: icon
      Critical:
        Base: dead
      Dead:
        Base: dead
  - type: RobotDownedVisuals # #Misfits Change: force the dead frame while the robot is lying down
  - type: Stripping # #Misfits Change: allow player robots to open strip UI with hover + E
  - type: RobotCriticalSparking # #Misfits Change: spark and crackle while near destruction, stop once repaired
  - type: Reflect # #Misfits Change: player robots can ricochet projectiles off their chassis
    innate: true
    reflectProb: 0.1
    spread: 150
    reflects:
    - NonEnergy
    - Energy
    - SmallCaliber
    - MediumCaliber
  - type: CanEnterCryostorage # #Misfits Add: allow player robot species to enter N14CryoBunkerLadder and despawn like MobHuman
  # #Misfits Fix: override base chassis Destructible to exclude borg_brain from EmptyContainersBehaviour.
  # Without this the PositronicBrain (containing the player mind) drops as loot when a player robot is
  # destroyed. The brain should be consumed with the chassis, not left on the floor.
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 75
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/warning_buzzer.ogg
          params:
            volume: 5
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Machines/AI/borg_death.ogg
      # Commented out to remove player bot gibbing.
#    - trigger:
#        !type:DamageTrigger
#        damage: 1000
#      behaviors:
#      - !type:PlaySoundBehavior
#        sound:
#          collection: MetalBreak
#      - !type:SpawnEntitiesBehavior
#        spawn:
#          PowerCellHyper:
#            min: 1
#            max: 1
#          N14Scrap1:
#            min: 2
#            max: 4
#          N14ScrapElectronic1:
#            min: 1
#            max: 3
#      - !type:EmptyContainersBehaviour
#        containers:
#        - borg_module
#        - cell_slot
#        # borg_brain intentionally omitted — player mind is destroyed with the chassis
#      - !type:DoActsBehavior
#        acts: [ "Destruction" ]

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticMrHandy
  name: mr. handy
  suffix: player, synthetic
  description: A General Atomics Mr. Handy domestic servant robot, now guided by a living mind.
  components:
  - type: HumanoidAppearance
    species: RobotMrHandy
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/mrhandyclaw.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: on # #Misfits Fix: lit indicator; BorgSystem overrides at runtime
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: on # #Misfits Fix: 'on' RSI state is the lit variant used as the flashlight glow overlay
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  - type: BorgHands # #Misfits Change: Mr. Handy gets a third usable item slot
    handCount: 3
  # #Misfits Change: Disabled idle/aggro auto-sounds for player-controlled robots — sounds fire uncontrollably while the player is present
  # - type: IdleSound
  # - type: SpamEmitSound
  #   minInterval: 15
  #   maxInterval: 50
  #   sound:
  #     collection: N14HandyIdle
  #     params:
  #       volume: -7
  #       maxDistance: 6
  - type: StepTriggerImmune
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
        Caustic: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups
  - type: Sanitized # #Misfits Change: makes mr handy not do damage in surgery

  - type: Gun # #Misfits Add: built-in flamer — right-click in combat mode to fire
    cameraRecoilScalar: 0
    fireRate: 10
    selectedMode: FullAuto
    availableModes:
    - FullAuto
    soundGunshot:
      path: /Audio/_Nuclear14/Weapons/Guns/Flames/flamer.ogg
    useKey: false
  - type: BasicEntityAmmoProvider # #Misfits Add: limited fuel bursts, auto-refills after cooldown
    proto: FireProjectile
    capacity: 30
    count: 30
  - type: RechargeBasicEntityAmmo # #Misfits Add: slow recharge simulates fuel regeneration
    rechargeCooldown: 3
  - type: RobotGunPowerDrain # #Misfits Add: each flamer burst drains the robot's chassis battery
    drainPerShot: 20
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module:
        - BorgModuleDiagnosis
        - BorgModuleTreatment
        - BorgModuleSurgery
        - BorgModuleCleaning # #Misfits Add: Mr. Handy is a domestic servant — cleaning module is thematic
        - BorgModuleGardening # #Misfits Add: domestic servant — gardening fits the Handy role
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCard
      ears: # #Misfits Fix - vault comms: wasteland + vault radio for vault-assigned robot
        - MisfitsClothingHeadsetRobotVault
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellAntiqueProto

- type: entity
  parent: N14BasePlayerSynthetic
  id: N14PlayerSyntheticProtectron
  name: protectron
  suffix: player, synthetic
  description: A RobCo Industries Protectron civil service robot, now guided by a living mind. The baseline model — equipped with an integrated hand-laser for self-defense and a general utility toolkit. Functional but unremarkable; the jack-of-all-trades among Protectron chassis types.
  components:
  - type: HumanoidAppearance
    species: RobotProtectron
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/protectron.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: on # #Misfits Fix: lit indicator; BorgSystem overrides at runtime
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: on # #Misfits Fix: 'on' RSI state is the lit variant used as the flashlight glow overlay
      shader: unshaded
      map: ["light"]
      visible: false
  - type: SpriteMovement
    movementLayers:
      movement:
        state: walking
    noMovementLayers:
      movement:
        state: icon
  - type: Speech
    speechVerb: Robotic
    speechSounds: Pai
  # #Misfits Change: Disabled idle/aggro auto-sounds for player-controlled robots — sounds fire uncontrollably while the player is present
  # - type: IdleSound
  # - type: SpamEmitSound
  #   minInterval: 15
  #   maxInterval: 50
  #   sound:
  #     collection: N14ProtectronIdle
  #     params:
  #       volume: -7
  #       maxDistance: 6
  - type: MovementSpeedModifier
    baseWalkSpeed: 2.0
    baseSprintSpeed: 3.5
  - type: Armor # #Misfits Change: innate Protectron plating matches BoS Combat Armor MK2 protection values
    modifiers:
      coefficients:
        Blunt: 0.7
        Slash: 0.7
        Piercing: 0.65
        Heat: 0.65
  - type: ExplosionResistance # #Misfits Change: keep Protectron chassis in line with BoS Combat Armor MK2 explosive protection
    damageCoefficient: 0.75
  - type: NpcFactionMember
    factions:
    - Wastelander
  - type: PassiveDamage # #Misfits Change: gradual self-repair, ~30 per type per minute
    allowedStates:
    - Alive
    - Critical
    damage:
      groups:
        Brute: -0.5
      types:
        Heat: -0.5
        Shock: -0.5
        Caustic: -0.5
  - type: RobotSelfRepairAnnouncer # #Misfits Change: hull integrity warnings + self-repair popups

  - type: Tag # #Misfits Change: Protectron walks, so it should have footstep sounds
    tags:
    - DoorBumpOpener
    - CanPilot
    - FootstepSound
  - type: FootstepModifier # #Misfits Add: metal footsteps instead of human barefoot sounds
    footstepSoundCollection:
      collection: N14FootstepMetalSolid
  - type: ContainerFill
    containers:
      borg_brain:
        - PositronicBrain
      borg_module: # #Misfits Add: civil-service general loadout — integrated laser for self-defense + basic utility toolkit
        - N14BorgModuleLaser # integrated hand-laser, matches Fallout canon dual hand-lasers
        - BorgModuleTool     # wrench/screwdriver/welder kit for general civil service tasks
      id: # #Misfits Change: pre-load the nav module into the id inventory slot
        - MisfitsRobotNavCardRobCo # RobCo Industries Navigation
      ears: # #Misfits Fix - vault comms: wasteland + vault radio for vault-assigned robot
        - MisfitsClothingHeadsetRobotVault
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellAntiqueProto

