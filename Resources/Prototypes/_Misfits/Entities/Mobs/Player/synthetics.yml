- type: entity
  parent: N14PlayerSyntheticProtectron
  id: N14PlayerSyntheticProtectronFire
  name: protectron firefighter
  suffix: player, synthetic, firefighter
  description: A RobCo Industries Protectron firefighter model equipped for fire suppression and emergency response. Features an integrated cryo emitter — its signature cryogenic projector that freezes flames and slows targets — backed by a standard water extinguisher module.
  components:
  - type: HumanoidAppearance
    species: RobotProtectronFire
  - type: Sprite
    sprite: _Nuclear14/Mobs/Robots/protectron-fire.rsi
    layers:
    - state: icon
      map: ["enum.DamageStateVisualLayers.Base", "movement"]
    - state: on # #Misfits Fix: lit indicator; BorgSystem overrides at runtime
      map: ["enum.BorgVisualLayers.Light"]
      shader: unshaded
      visible: false
    - state: on # #Misfits Fix: 'on' RSI state is the lit variant used as the flashlight glow overlay
      shader: unshaded
      map: ["light"]
      visible: false
  - type: Gun # #Misfits Add: integrated cryo emitter — Fallout canon firefighter Protectrons carry an internal cryo gun
    minAngle: 9
    maxAngle: 18
    angleIncrease: 3
    angleDecay: 4
    fireRate: 1.5
    soundGunshot:
      path: /Audio/Effects/extinguish.ogg
    useKey: false
    selectedMode: SemiAuto
    availableModes:
