#MARK: Super Mutant Suicider
- type: entity
  name: Super Mutant Suicider
  id: N14MobSuperMutantSuicider
  parent: N14MobBaseHostileSuperMutant
  description: A crazed super mutant strapped with improvised explosives, charging headlong at anyone it can find. Run.
  # DesertRose source: hulk_suicider_s - maxHealth=500, del_on_death=1, spawns explosion at aggro after 6s timer
  # SS14 port: explosion triggers at death threshold (simplified from timed trigger)
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      180: Dead
  - type: HTN
    rootTask:
      task: N14HostileCompound
    blackboard:
      NavSmash: !type:Bool
        true
      MeleeRange: !type:Single
        1.5
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14SuperMutantAttack #Misfits Change
    angle: 60
    animation: WeaponArcFist
    damage:
      types:
        Blunt: 50
    range: 1.5
  - type: Explosive
    # Misfits Change - Suicider explosion. DesertRose: suicide grenade, approx radius 4 tiles.
    explosionType: N14DefaultStructural
    maxIntensity: 10
    intensitySlope: 3
    totalIntensity: 100
    canCreateVacuum: false
    maxTileBreak: 1
    tileBreakScale: 0.5
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 180
      behaviors:
      - !type:ExplodeBehavior
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: DamageStateVisuals
    states:
      Alive:
        Base: suicider
      Dead:
        Base: base_dead
  - type: Sprite
    scale: 1.5, 1.5 # Misfits Tweak: Super Mutants are 1.5x bigger than humans.
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: suicider
      sprite: _Nuclear14/Mobs/SuperMutants/supermutant.rsi

