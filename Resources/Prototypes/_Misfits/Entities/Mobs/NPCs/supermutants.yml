# Misfits Change - Super Mutant NPC mob variants
# Ported and adapted from DesertRose2/desertrose supermutant.dm
# Original BYOND mobs: hulk_113_s (base), hulk_melee_s (brute), hulk_ranged_s (hunter),
# night_s (nightkin), night_ranged_s (nightkin vet), night_boss_s (nightkin elite),
# hulk_suicider_s (suicider), hulk_s (armored)
# Sprites: DesertRose2/desertrose supermutant.dmi / supermutant_dead.dmi (CC-BY-NC-SA-3.0)

#MARK: Base Super Mutant
- type: entity
  name: Super Mutant
  id: N14MobSuperMutantNPC
  parent: N14MobBaseHostileSuperMutant
  description: A massive green creature of bone and muscle, created by the FEV virus. Surprisingly articulate and infuriatingly durable.
  # DesertRose source: hulk_113_s - mob_size=LARGE, maxHealth=300, melee 45-55, calls summon_backup
  components:
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14SuperMutantAttack #Misfits Change
    angle: 60
    animation: WeaponArcFist
    damage:
      types:
        Blunt: 35
    range: 1.8
  - type: Sprite
    scale: 1.5, 1.5 # Misfits Tweak: Super Mutants are 1.5x bigger than humans.
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: base
      sprite: _Nuclear14/Mobs/SuperMutants/supermutant.rsi

#MARK: Melee Super Mutant (Brute)
- type: entity
  name: Super Mutant Brute
  id: N14MobSuperMutantMelee
  parent: N14MobBaseHostileSuperMutant
  description: A super mutant armed with a makeshift sledgehammer, hunting anything it can crush.
  # DesertRose source: hulk_melee_s - maxHealth=350, melee 45-65 (sledgehammer attack)
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      250: Dead
  - type: HTN
    rootTask:
      task: N14HostileCompound
    blackboard:
      NavSmash: !type:Bool
        true
      MeleeRange: !type:Single
        1.8
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14SuperMutantAttack #Misfits Change
    angle: 60
    animation: WeaponArcFist
    damage:
      types:
        Blunt: 50
    range: 1.8
  - type: DamageStateVisuals
    states:
      Alive:
        Base: melee
      Dead:
        Base: melee_dead
  - type: Sprite
    scale: 1.5, 1.5 # Misfits Tweak: Super Mutants are 1.5x bigger than humans.
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: melee
      sprite: _Nuclear14/Mobs/SuperMutants/supermutant.rsi

#MARK: Ranged Super Mutant (Hunter)
- type: entity
  name: Super Mutant Hunter
  id: N14MobSuperMutantRanged
  parent: N14MobBaseHostileSuperMutant
  description: A super mutant armed with a scavenged hunting rifle. More dangerous from a distance.
  # DesertRose source: hulk_ranged_s - maxHealth=400, 7.62 hunting rifle, retreat_distance=4, minimum_distance=6
  components:
  - type: MobThresholds
    thresholds:
      0: Alive
      220: Dead
  - type: MeleeWeapon
    hidden: true
    soundHit:
      collection: N14SuperMutantAttack #Misfits Change
    angle: 60
    animation: WeaponArcFist
    damage:
      types:
        Blunt: 30
    range: 1.8
  - type: Gun
    minAngle: 5
    maxAngle: 20
    angleIncrease: 3
    angleDecay: 14
    fireRate: 1
    soundGunshot:
      collection: N14BattleRifleGunshot
    useKey: false
    selectedMode: SemiAuto
    availableModes:
      - SemiAuto
  - type: BasicEntityAmmoProvider
    proto: N14Cartridge762Rifle
    capacity: 20
    count: 20
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 3
    rechargeSound:
      path: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
  - type: DamageStateVisuals
    states:
      Alive:
        Base: ranged
      Dead:
        Base: ranged_dead
  - type: Sprite
    scale: 1.5, 1.5 # Misfits Tweak: Super Mutants are 1.5x bigger than humans.
    drawdepth: Mobs
    layers:
    - map: ["enum.DamageStateVisualLayers.Base"]
      state: ranged
      sprite: _Nuclear14/Mobs/SuperMutants/supermutant.rsi

