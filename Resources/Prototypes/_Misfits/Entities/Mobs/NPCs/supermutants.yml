- type: entity
  name: Super Mutant Behemoth
  id: N14MobBehemoth
  parent: N14MobBaseHostileSuperMutant
  description: A towering ancient super mutant, its body warped beyond recognition by decades of FEV exposure. A walking natural disaster.
