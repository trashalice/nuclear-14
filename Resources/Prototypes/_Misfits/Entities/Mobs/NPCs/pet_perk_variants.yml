# Pet Cat — feline companion ghost role for the N14PetCat trait
- type: entity
  name: cat
  id: N14MobPetCat
  parent: MobCat
  description: A basic wasteland cat, somehow your companion.
  components:
  - type: GhostRole
    name: ghost-role-information-n14pet-cat-name
    description: ghost-role-information-n14pet-generic-description
    rules: ghost-role-component-default-rules
    makeSentient: false
    allowMovement: true
  - type: GhostTakeoverAvailable
  - type: MobThresholds # #Misfits Add - allow revival by medics
    allowRevives: true
  - type: Inventory
    speciesId: cat
    templateId: cat_pet
  - type: Puller # #Misfits Add - explicit puller for drag mechanic
    needsHands: false
  - type: Hands # #Misfits Add - allows dragging and item handling
  - type: BorgHands # #Misfits Add - gives cats actual holdable hand slots
    handCount: 2
  - type: RobotWeaponPickupBlacklist # #Misfits Add - cats should not be able to pick up guns/melee weapons
    blacklist:
      components:
      - Gun
      - MeleeWeapon
  - type: InventorySlots
  - type: Strippable
  - type: PetCollarHolder
  - type: UserInterface
    interfaces:
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: PassiveDamage # #Misfits Add - slow natural regeneration for player-controlled pet cats
    allowedStates:
    - Alive
    - Critical
    damageCap: 0
    damage:
      groups:
        Brute: -0.5
        Burn: -0.5
        Toxin: -0.5
        Airloss: -3

