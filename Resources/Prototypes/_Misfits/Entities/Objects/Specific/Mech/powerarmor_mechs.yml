- type: entity
  id: BasePowerArmorMech
  abstract: true
  parent: [ BaseMech, CombatMech ]
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    scale: 1.2, 1.2
    layers:
    # Power armor mechs use the worn suit + helmet composite, not the handheld icon state.
    - map: [ "enum.MechVisualLayers.Base" ]
      state: equipped-OUTERCLOTHING
    - map: [ "enum.PaperLabelVisuals.Layer" ]
      sprite: Structures/Storage/Crates/labels.rsi
      state: paper
  - type: FootstepModifier
    footstepSoundCollection:
      collection: N14FootstepPowerArmor
  - type: Mech
    baseState: equipped-OUTERCLOTHING
    airtight: true
    maxIntegrity: 400
    # Worn PA defaults to 10% bleedthrough while integrity is intact.
    mechToPilotDamageMultiplier: 0.10
    pilotWhitelist:
      components:
      - HumanoidAppearance
  - type: MeleeWeapon
    hidden: true
    attackRate: 1
    damage:
      types:
        Blunt: 20
        Structural: 25
  - type: MovementSpeedModifier
    # Match default humanoid movement for the initial PA mech pass.
    baseWalkSpeed: 3
    baseSprintSpeed: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          # Keep the mech visually larger, but close enough to a human collider to fit standard doors/walkways.
          radius: 0.40
        density: 21390
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Damageable
    damageModifierSet: MisfitsMechPowerArmorT45
  - type: StaticPrice
    price: 2000
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound

- type: entity
  id: N14MechPowerArmorT45
  parent: BasePowerArmorMech
  name: t-45 power armor
  description: A mech refit built around T-45 power armor plating.
  components:
  - type: Sprite
    drawdepth: Mobs
    noRot: true
    layers:
    - sprite: _Nuclear14/Clothing/OuterClothing/PowerArmor/t45.rsi
      map: [ "enum.MechVisualLayers.Base" ]
      state: equipped-OUTERCLOTHING
    - sprite: _Nuclear14/Clothing/Head/PowerArmorHelmets/t45.rsi
      state: off-equipped-HELMET
    - sprite: _Nuclear14/Clothing/Head/PowerArmorHelmets/t45.rsi
      state: equipped-HELMET-unshaded
      shader: unshaded
    - map: [ "enum.PaperLabelVisuals.Layer" ]
      sprite: Structures/Storage/Crates/labels.rsi
      state: paper
  - type: Mech
    maxIntegrity: 400

- type: entity
  id: N14MechPowerArmorT45Battery
  parent: N14MechPowerArmorT45
  suffix: Battery
  components:
  - type: ContainerFill
    containers:
      mech-battery-slot:
      - PowerCellHigh

