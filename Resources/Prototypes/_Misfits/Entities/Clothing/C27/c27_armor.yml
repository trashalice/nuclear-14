# #Misfits Add - C-27 humanoid robot outer armor: 3 tiers (light/medium/heavy) × 3 factions
# (generic/NCR/BoS) = 9 concrete entities. Gated by MisfitsC27ArmorComponent (Phase D shared
# system: only HumanoidAppearance.Species == "C27" can equip) AND by the C27Wearable tag
# whitelist on the c27 inventory template's outerClothing slot.
#
# Heavy variants get the N14PowerArmor marker (`requiresProficiency: false`) so they trigger
# the carry-restriction interactions used by N14 power-armor gameplay, but they DO NOT inherit
# the human PA scaffolding (no bundled fusion core / gauntlets / boots — C-27 limbs are already
# metal and don't need them).

# === Abstract bases: tier templates ===

- type: entity
  abstract: true
  # #Misfits Fix - add AllowSuitStorageClothing so the c27 inventory template's suitstorage
  # slot (gated by dependsOnComponents: AllowSuitStorage) becomes usable while wearing C-27
  # armor. Mirrors how standard combat armor enables suit storage in upstream armor.yml.
  parent: [ClothingOuterBase, AllowSuitStorageClothing]
  id: BaseC27Armor
  components:
  - type: MisfitsC27Armor
  - type: Tag
    tags:
    - C27Wearable
  - type: Clothing
    slots:
    - outerClothing

- type: entity
  abstract: true
  parent: BaseC27Armor
  id: BaseC27ArmorLight
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80    # #Misfits Tweak - 20% DR → 500 effective HP
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.85     # light plating runs hotter — weaker heat shielding than medium

- type: entity
  abstract: true
  parent: BaseC27Armor
  id: BaseC27ArmorMedium
  components:
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.65   # #Misfits Tweak - 33% DR → 600 effective HP
        Slash: 0.65
        Piercing: 0.65
        Heat: 0.70     # slightly weaker heat resist than physical — chassis cooling limits
  - type: Reflect # #Misfits Add - 30% ricochet on medium plating; stacks on top of bare chassis 10% (outermost check wins)
    reflects:
      - SmallCaliber
    reflectProb: 0.20
    innate: true
    spread: 90
  - type: ClothingSpeedModifier
    walkModifier: 0.95
    sprintModifier: 0.95

- type: entity
  abstract: true
  parent: BaseC27Armor
  id: BaseC27ArmorHeavy
  components:
  # #Misfits Tweak - 50% DR → 800 effective HP. No integrity system; pure coefficient.
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.50    # #Misfits Tweak - 50% DR → 800 effective HP
        Slash: 0.50
        Piercing: 0.50
        Heat: 0.50
        Caustic: 0.55  # partial acid resist — ablative plate degrades under caustic
        Radiation: 0.0 # explicit immunity (also in MisfitsC27Silicon modset)
  - type: Repairable  # #Misfits Add - weld repair for heavy plating
    fuelCost: 10
    doAfterDelay: 30
    qualityNeeded: Welding
  - type: Reflect # #Misfits Add - 20% ricochet on heavy plating; hardened combat chassis deflects most small/medium rounds. .50 bypasses via ignoreResistances:true ALSO BECAUSE OF SHITCODE I CANT REMOVE ENERGY DEFLECT BY ITSELF THE AI THEY HAD CODE REFLECT DECIDED REFLECT IN ITSELF DOES ENERGY DEFLECT
    reflects:
      - SmallCaliber
      - MediumCaliber
    reflectProb: 0.20
    innate: true
    spread: 90
  - type: ClothingSpeedModifier
    walkModifier: 0.75 # #Misfits Tweak - 25% penalty; meaningful tradeoff for the DR
    sprintModifier: 0.75
  - type: ExplosionResistance
    damageCoefficient: 0.15 # #Misfits Tweak - 85% explosion reduction

# === Concrete: Light tier ===

- type: entity
  parent: BaseC27ArmorLight
  id: ClothingC27ArmorLightGeneric
  name: c-27 light armor plating
  description: A basic factory-issue armor plate set for C-27 chassis. Light, unbranded, and easy to repair.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_light_generic.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_light_generic.rsi

- type: entity
  parent: BaseC27ArmorLight
  id: ClothingC27ArmorLightNCR
  name: c-27 light armor plating (ncr issue)
  description: NCR-issued light armor plates for C-27 conscripts. Painted in republic khaki.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_light_ncr.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_light_ncr.rsi

- type: entity
  parent: BaseC27ArmorLight
  id: ClothingC27ArmorLightBoS
  name: c-27 light armor plating (brotherhood issue)
  description: Brotherhood of Steel light armor plates for C-27 auxiliaries. Painted in the Brotherhood's signature deep blue.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_light_bos.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/c27_light_bos.rsi

