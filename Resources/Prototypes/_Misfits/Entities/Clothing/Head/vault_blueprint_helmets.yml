  name: vault combat helmet
  description: An extremely advanced combat helmet manufactured in Vault-Tec colors, comes with an integrated gas mask.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/Head/Helmets/vaulthelmet.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/Head/Helmets/vaulthelmet.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.8
        Slash: 0.8
        Piercing: 0.85
        Heat: 0.85
    priceMultiplier: 0.5
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: NightVision
    isEquipment: true
  - type: IntegratedNightVisionHelmet
    setId: vault-combat

