    sprite: _Misfits/Clothing/SuperMutant/gloves.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/SuperMutant/gloves.rsi
  - type: Tag
    tags:
    - SuperMutantWearable

# --- Shoes ---
