# #Misfits Add - Gladiator set for the playable Supermutant Gladiator variant.
# Uses dedicated supermutant-fitted directional sheets so the outfit renders cleanly on species layers.

# --- Gladiator Loincloth ---
- type: entity
  parent: UnsensoredClothingUniformBase
  id: ClothingSuperMutantGladiatorLoincloth
  name: supermutant gladiator loincloth
  description: A hardened arena loincloth cut for a supermutant frame.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/SuperMutant/gladiator_loincloth.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/SuperMutant/gladiator_loincloth.rsi
  - type: Tag
    tags:
    - SuperMutantWearable

# --- Gladiator Armor ---
- type: entity
  parent: [ClothingOuterBase, AllowSuitStorageClothing] # #Misfits Add - AllowSuitStorageClothing enables the back holster (suitstorage) slot
  id: ClothingSuperMutantGladiatorArmor
  name: supermutant gladiator armor
  description: Heavy scrap armor reinforced for pit fights and close-quarters brutality.
  components:
  - type: Sprite
    sprite: _Misfits/Clothing/SuperMutant/gladiator_armor.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/SuperMutant/gladiator_armor.rsi
  - type: Tag
    tags:
    - SuperMutantWearable
  - type: Armor # #Misfits Add - 15% physical damage resistance baseline
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.75

# --- Gladiator Boots ---
- type: entity
  parent: ClothingShoesBase
  id: ClothingSuperMutantGladiatorBoots
  name: supermutant gladiator boots
  description: Arena boots built for traction and impact on broken concrete.
