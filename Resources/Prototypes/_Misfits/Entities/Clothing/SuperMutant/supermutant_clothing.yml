    - SuperMutantWearable

# --- Gladiator Helmet ---
- type: entity
  parent: ClothingHeadBase
  id: ClothingSuperMutantGladiatorHelmet
  name: supermutant gladiator helmet
  description: A brutal steel helm meant to survive point-blank blows in the arena.
