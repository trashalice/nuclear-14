    sprite: _Misfits/Clothing/OuterClothing/Armor/advancedvaultvest.rsi
  - type: Clothing
    sprite: _Misfits/Clothing/OuterClothing/Armor/advancedvaultvest.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.675
        Heat: 0.75
    priceMultiplier: 0.5
  - type: ClothingSpeedModifier
