# #Misfits Add - Faction-shared terminal database prototypes.
# Every terminal exposes a DATABASE tab; the viewer's ID access tags determine which
# faction database (if any) they see. Empty accessRead = nobody (NO ACCESS sentinel).
#
# Tier model:
#   accessRead     (tag)    Tier 5  - View tab + folder list.
#   accessWrite    (tag)    Tier 6  - Add subfolders / docs UNDER existing root entries.
#   leadershipJobs (jobId)  Tier 7  - Create root entries; delete/restore non-Admin
#                                     entries; rollback revisions; MAY also tick the
#                                     "Admin" checkbox to protect their own docs/folders
#                                     from peer leaders. Job-gated so spawned ID cards
#                                     cannot grant deletion power.
#   adminJobs      (jobId)  Tier 8  - Delete/restore/edit Admin-marked entries;
#                                     everything Leadership can do.
#   adminLabel     (string) Faction-themed label for the Admin checkbox in the UI.

# -- Followers of the Apocalypse: Open Archive --------------------------------
# Volunteers can read and contribute under existing roots.
# Doctors manage root records.
# The Head can mark protected chapter records.
- type: misfitsTerminalDatabase
  id: fota-openarchive
  displayName: Open Archive
  accentColor: "#E8A838"
  adminLabel: DIRECTOR
  accessRead:
  - FotA
  accessWrite:
  - FotA
  leadershipJobs:
  - FollowerDoctor
  - SuperMutantFollowerDoctor
  adminJobs:
  - FollowerHead

# ── Brotherhood of Steel: 509th Archive ──────────────────────────────────────
# Leadership = Heads (Knight / Paladin Commander / Scribe).
# Admin      = Elder Commander.
- type: misfitsTerminalDatabase
  id: bos-509th
  displayName: 509th Archive
  accentColor: "#33FF33"
  adminLabel: ELDER COUNCIL
  accessRead:
  - BOS
  accessWrite:
  - BOS
  leadershipJobs:
  - BoSHeadKnight
  - BoSMidPaladinCommander # "Head Paladin" job id
  - BoSWestScribe          # "Head Scribe" job id
  adminJobs:
  - BoSWestElderCommander  # "Elder Commander" job id

# ── NCR: Salt Dogs ───────────────────────────────────────────────────────────
