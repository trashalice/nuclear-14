# ── Wendover Town: Mayoral Notice ────────────────────────────────────────────
# #Misfits Tweak - Townie governance is informal; only the Mayor exists. Mayor
# acts as both Leadership and Admin tiers (Admin checkbox is essentially the
# mayor's official seal). Leadership list intentionally empty; Admin grants
# Leadership powers automatically.
- type: misfitsTerminalDatabase
  id: town-mayoral
  displayName: Mayoral Notice
  accentColor: "#33FF33"
  adminLabel: MAYORAL SEAL
  accessRead:
  - TownieMayor
  accessWrite:
  - TownieMayor
  leadershipJobs: []
  adminJobs:
  - TownMayor
