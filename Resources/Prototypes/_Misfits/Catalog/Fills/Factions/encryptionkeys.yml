- type: entity
  name: legion encryption key box
  parent: BoxCardboard
  id: BoxEncryptionKeyLegion
  description: A box of spare encryption keys.
  components:
  - type: StorageFill
    contents:
    - id: EncryptionKeyLegion
      amount: 6
  - type: Sprite
    layers:
    - state: box
    - state: encryptokey
  - type: Storage
    whitelist:
      components:
      - EncryptionKey

