      message: >-
        Explosions now knock down nearby characters. larger blasts ragdoll for
        longer, small ones have no effect.
    - type: Tweak
      message: >-
        Reduced background network traffic from faction overlay updates. No
        visible change for players.
    - type: Tweak
      message: >-
        C-27 robots are now significantly more durable with 400 base HP and full
        radiation immunity. Armor now comes from equipped plating rather than
        innate chassis bonuses.
    - type: Tweak
      message: >-
        C-27 Medium and Heavy armor must now be crafted at an armor workbench
        using a C-27 Armor Blueprint — it is no longer handed out at spawn.
