    - type: Fix
      message: >-
        Fixed the in-game changelog window going blank when entries contained
        certain special characters like brackets.
    - type: Fix
      message: >-
        Fixed loadout and trait time requirements always showing the wrong
        amount of playtime needed, regardless of how much time you'd actually
        played.
