      message: >-
        Picking a species with restricted jobs in the character editor now
        auto-selects those jobs so you don't accidentally spawn as a
        Wastelander.
    - type: Add
      message: >-
        Dead characters can no longer rejoin the same round under the same name.
        If you die, your job slot re-opens after 15 minutes and you must pick a
        different character to return. unless you are revived, cryoed, or an
        admin respawns you.
    - type: Add
      message: Enclave now has spawn points and job slots active on the Vault map.
    - type: Add
      message: >-
        Added Supermutant Ranger, Trooper, NCR Ranger new whitelisted roles,
        each with unique armor and faction loadouts.
    - type: Add
      message: >-
        Added C-27 Armor Blueprints (Generic, NCR, Brotherhood) for crafting
        medium and heavy chassis plating.
    - type: Add
      message: >-
        Added new sprites and wearable Tribal APA power armor, tribal bow,
        Powder Ganger clothing, Children of Atom banners, Enclave blue/grey
        uniforms and a heavier combat armor variant, leather pouches belt,
        supermutant ranger armor, trooper armor, skull necklace, and battle
        wrap.
    - type: Add
      message: >-
        The Ug-Qualtoth idol now has its own dedicated art instead of a cave
        rock placeholder.
    - type: Add
      message: C-27 latejoin spawn points added to Wendover,.
